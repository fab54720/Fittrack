<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#e8a020">
<title>Fab/Sport</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#e8a020;--dark:#090909;--card:#101014;--bd:#1c1c26;
  --tx:#efefef;--mu:#565668;--g:#00d485;--r:#ff3d4f;--b:#3b82f6;--o:#f59e0b;--p:#a855f7;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:var(--dark);color:var(--tx);font-family:'Inter',system-ui,sans-serif;font-size:14px;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:72px;}
input,select,button,textarea{font-family:inherit;font-size:14px;}

/* GLOW BG */
body::after{content:'';position:fixed;top:-80px;left:50%;transform:translateX(-50%);width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(232,160,32,.06),transparent 70%);pointer-events:none;z-index:0;}

/* NAV */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(8,8,10,.97);backdrop-filter:blur(10px);border-top:1px solid var(--bd);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nb{flex:1;padding:9px 2px 7px;background:none;border:none;color:var(--mu);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;transition:color .2s;}
.nb.active{color:var(--gold);}
.nb.active .ni{filter:drop-shadow(0 0 8px rgba(232,160,32,.7));}
.ni{font-size:19px;line-height:1;}

/* HEADER */
#hdr{background:linear-gradient(180deg,#0d0d11 0%,var(--dark) 100%);padding:11px 16px 9px;border-bottom:1px solid #13131c;position:sticky;top:0;z-index:50;}
.app-name{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);letter-spacing:3px;line-height:1;}
.app-sub{font-size:11px;color:#333344;margin-top:1px;}

/* PAGES */
.pg{display:none;padding:12px;position:relative;z-index:1;animation:fadein .2s ease;}
.pg.active{display:block;}
@keyframes fadein{from{opacity:.4;transform:translateY(4px)}to{opacity:1;transform:none}}

/* CARD */
.card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:14px;margin-bottom:10px;}
.ct{font-size:10px;color:#3e3e55;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:10px;}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
.mb8{margin-bottom:8px;}
.mb12{margin-bottom:12px;}

/* KPI BOX */
.kb{background:var(--dark);border-radius:10px;padding:10px;text-align:center;border:1px solid var(--bd);}
.kv{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;letter-spacing:1px;}
.kl{font-size:9px;color:var(--mu);margin-top:2px;}

/* FORM */
.inp{background:var(--dark);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:9px 11px;width:100%;outline:none;transition:border-color .2s;}
.inp:focus{border-color:rgba(232,160,32,.5);}
select.inp option{background:#111;}
.lbl{display:block;font-size:10px;color:#3e3e55;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;font-weight:700;}

/* BUTTONS */
.btn{width:100%;border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;transition:transform .12s,opacity .12s;letter-spacing:.3px;}
.btn:active{transform:scale(.97);opacity:.9;}
.btn-gold{background:linear-gradient(90deg,#e8a020,#c47a10);color:#000;}
.btn-outline{background:rgba(232,160,32,.1);border:1px solid rgba(232,160,32,.3);color:var(--gold);}
.btn-green{background:rgba(0,212,133,.1);border:1px solid rgba(0,212,133,.3);color:var(--g);}
.btn-red{background:rgba(255,61,79,.1);border:1px solid rgba(255,61,79,.3);color:var(--r);}
.btn-purple{background:linear-gradient(90deg,rgba(26,10,48,.9),rgba(10,21,48,.9));border:1px solid rgba(168,85,247,.4);color:var(--p);}
.btn-sm{padding:6px 12px;width:auto;font-size:11px;}

/* TAG */
.tag{border-radius:20px;padding:3px 8px;font-size:10px;font-weight:700;display:inline-block;}
.tag-g{background:#0a1f14;border:1px solid #00d48540;color:var(--g);}
.tag-o{background:#1a1200;border:1px solid #f59e0b40;color:var(--o);}
.tag-b{background:#0a1530;border:1px solid #3b82f640;color:var(--b);}
.tag-p{background:#150a28;border:1px solid #a855f740;color:var(--p);}
.tag-gold{background:#1a1200;border:1px solid #e8a02040;color:var(--gold);}
.tag-r{background:#180308;border:1px solid #ff3d4f40;color:var(--r);}

/* PROGRESS BAR */
.pbar{background:var(--dark);border-radius:20px;height:6px;overflow:hidden;}
.pfill{height:100%;border-radius:20px;transition:width .6s cubic-bezier(.4,0,.2,1);}

/* WEEKLY */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:10px;}
.day-pill{border-radius:8px;padding:6px 2px;text-align:center;cursor:pointer;border:1px solid var(--bd);transition:transform .1s;}
.day-pill:active{transform:scale(.93);}
.day-pill.muscu{border-color:var(--g);background:#091a0f;}
.day-pill.cardio{border-color:var(--r);background:#180308;}
.day-pill.repos{opacity:.35;}
.day-pill.today-hl{box-shadow:0 0 0 2px var(--gold);}
.day-lbl{font-size:9px;color:var(--mu);font-weight:700;}
.day-ico{font-size:12px;margin-top:2px;}

/* CHECKBOX */
.chk{width:26px;height:26px;border-radius:7px;border:2px solid var(--bd);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .15s;}
.chk.done{border-color:var(--g);background:var(--g);color:#000;}

/* ALERTS */
.al-gold{background:#130e00;border:1px solid rgba(232,160,32,.25);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:12px;line-height:1.6;color:var(--gold);}
.al-b{background:#080f1e;border:1px solid rgba(59,130,246,.25);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:12px;line-height:1.6;color:var(--b);}
.al-g{background:#051209;border:1px solid rgba(0,212,133,.25);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:12px;line-height:1.6;color:var(--g);}
.al-p{background:#0d0519;border:1px solid rgba(168,85,247,.25);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:12px;line-height:1.6;color:var(--p);}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.sheet{background:var(--card);border:1px solid var(--bd);border-radius:18px 18px 0 0;padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom));}
.sheet-title{font-size:16px;font-weight:800;flex:1;}
.sheet-close{background:var(--bd);border:none;color:var(--tx);border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}

/* TIMER */
#timer-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;align-items:center;justify-content:center;}
#timer-ov.open{display:flex;}
.t-ring{width:180px;height:180px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;background:var(--card);}
.t-svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.t-num{font-family:'Bebas Neue',sans-serif;font-size:54px;color:var(--gold);letter-spacing:2px;line-height:1;}
.t-unit{font-size:11px;color:var(--mu);}

/* TOAST */
#toast{display:none;position:fixed;top:66px;left:50%;transform:translateX(-50%);background:var(--card);border-radius:8px;padding:8px 18px;font-size:13px;font-weight:700;z-index:999;white-space:nowrap;border:1px solid var(--gold);color:var(--gold);}

/* ALIMENT */
.alim-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #111118;cursor:pointer;}
.alim-add{background:rgba(232,160,32,.1);border:1px solid rgba(232,160,32,.3);color:var(--gold);border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;}
.alim-add.added{background:rgba(0,212,133,.1);border-color:var(--g);color:var(--g);}

/* MEAL CARD */
.meal-card{background:var(--dark);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;}
.meal-card:active{border-color:var(--gold);}

/* FRIGO TAG */
.ftag{display:inline-flex;align-items:center;gap:4px;background:#1a1200;border:1px solid rgba(232,160,32,.35);border-radius:20px;padding:3px 8px 3px 10px;margin:3px;font-size:12px;color:var(--gold);}
.ftag button{background:none;border:none;color:rgba(232,160,32,.5);cursor:pointer;font-size:14px;line-height:1;padding:0;}

/* PROFILE */
.prof-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.prof-card{background:var(--dark);border:2px solid var(--bd);border-radius:12px;padding:12px 8px;cursor:pointer;text-align:center;transition:all .15s;}
.prof-card.active{border-color:var(--gold);background:#130e00;}
.prof-card:active{transform:scale(.96);}

/* OBJ OPTION */
.obj-opt{padding:10px 14px;border-radius:10px;border:1px solid var(--bd);cursor:pointer;margin-bottom:6px;transition:all .15s;}
.obj-opt.sel{border-color:var(--gold);background:#130e00;}
.obj-opt h4{font-size:13px;font-weight:700;margin-bottom:2px;}
.obj-opt p{font-size:11px;color:var(--mu);}

/* FOOD CHIP */
.fchip{display:inline-block;padding:4px 10px;border-radius:20px;border:1px solid var(--bd);background:var(--dark);color:var(--mu);font-size:11px;cursor:pointer;margin:3px;transition:all .15s;}
.fchip.on{border-color:var(--gold);background:#1a1200;color:var(--gold);}

/* AI */
.ai-dots{display:flex;align-items:center;gap:6px;padding:14px;color:var(--p);}
.dot{width:6px;height:6px;border-radius:50%;background:var(--p);animation:pulse 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8);}40%{opacity:1;transform:scale(1.2);}}
.ai-out{background:linear-gradient(135deg,#100720,#060d1a);border:1px solid rgba(168,85,247,.35);border-radius:12px;padding:14px;margin-top:10px;font-size:13px;line-height:1.75;color:#d4b8f0;white-space:pre-wrap;word-break:break-word;}

/* OBJ BAR */
.obj-bar{background:linear-gradient(135deg,#0d0d11,#101014);border:1px solid rgba(232,160,32,.15);border-radius:14px;padding:14px;margin-bottom:10px;}

/* SEANCE CHIP */
.schip{padding:6px 12px;border-radius:20px;border:1px solid var(--bd);background:none;color:var(--mu);cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;transition:all .15s;}
.schip.on{border-color:var(--gold);background:#130e00;color:var(--gold);}

/* SCROLLBAR */
::-webkit-scrollbar{width:2px;}::-webkit-scrollbar-thumb{background:#252530;}
</style>
</head>

function dernierPoids(){ return poidsLog.length ? poidsLog[poidsLog.length-1].poids : (profil.poidsDepart||85); }
function imc(){ var h=(profil.taille||170)/100; return (dernierPoids()/(h*h)).toFixed(1); }

function nbSeancesSem(){

  return seancesLog.filter(function(s){ var d=new Date(s.date); return d>=lundi&&d<=fin; }).length;
}
function parseTimer(r){
  var m = String(r).match(/(\d+)(?:-\d+)?\s*sec/i); if(m) return parseInt(m[1]);
  var m2 = String(r).match(/(\d+)\s*min/i); if(m2) return parseInt(m2[1])*60;
  return 0;
}
function getObjDef(){ return OBJECTIFS.find(function(o){return o.id===profil.objectif;})||OBJECTIFS[0]; }
function todayCalLog(){ return calLog.find(function(c){return c.date===new Date().toISOString().slice(0,10);})||{kcal:0,p:0,g:0,l:0,repas:[]}; }

// ============================================================
// TIMER
// ============================================================
function startTimer(secs, label){
  timerTotal = secs; timerLeft = secs; timerPaused = false;
  document.getElementById("t-label").textContent = label||"";
  document.getElementById("timer-ov").classList.add("open");
  document.getElementById("t-pause").textContent = "Pause";
  updateTimerDisplay();
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(function(){
    if(timerPaused) return;
    timerLeft--;
    updateTimerDisplay();
    if(timerLeft <= 0){
      clearInterval(timerInterval);
      document.getElementById("timer-ov").classList.remove("open");
      if(navigator.vibrate) navigator.vibrate([200,100,200]);
      toast("Temps ecoule !");
    }
  }, 1000);
}
function updateTimerDisplay(){
  var m = Math.floor(timerLeft/60), s = timerLeft%60;
  document.getElementById("t-num").textContent = timerLeft>=60?(m+":"+(s<10?"0":"")+s):String(timerLeft);
  document.getElementById("t-unit").textContent = timerLeft>=60?"min":"sec";
  var pct = timerTotal>0 ? timerLeft/timerTotal : 0;
  var offset = 515*(1-pct);
  document.getElementById("t-arc").setAttribute("stroke-dashoffset", String(offset));
  var col = timerLeft>timerTotal*.5?"var(--gold)":timerLeft>timerTotal*.25?"var(--o)":"var(--r)";
  document.getElementById("t-arc").setAttribute("stroke", col);
  document.getElementById("t-num").style.color = col;
}

// POIDS CHART
// ============================================================
function poidsChart(){
  if(poidsLog.length < 2) return "<div style='color:#2a2a38;text-align:center;padding:20px;font-size:12px;'>Enregistrez votre poids pour voir la courbe</div>";
  var vals = poidsLog.slice(-14).map(function(p){return p.poids;});
  var dates = poidsLog.slice(-14).map(function(p){return p.date.slice(5);});
  var W=300,H=90,PL=30,PR=10,PT=8,PB=20,cW=W-PL-PR,cH=H-PT-PB;
  var cible = profil.poidsCible||78;
  var minV = Math.min.apply(null,vals.concat([cible]))-0.5;
  var maxV = Math.max.apply(null,vals)+0.5;
  var xS = cW/Math.max(vals.length-1,1);
  function px(i){return PL+i*xS;}
  function py(v){return PT+cH-(v-minV)/(maxV-minV)*cH;}
  var pts = vals.map(function(v,i){return px(i)+","+py(v);}).join(" ");
  var fill = "M"+px(0)+","+py(vals[0]);
  for(var i=1;i<vals.length;i++) fill += " L"+px(i)+","+py(vals[i]);
  fill += " L"+px(vals.length-1)+","+(PT+cH)+" L"+px(0)+","+(PT+cH)+" Z";
  var step = Math.ceil(vals.length/5);
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px;">'
    +'<defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8a020" stop-opacity=".25"/><stop offset="100%" stop-color="#e8a020" stop-opacity="0"/></linearGradient></defs>'
    +'<text x="'+(PL-3)+'" y="'+(PT+5)+'" fill="#3e3e55" font-size="7" text-anchor="end">'+maxV.toFixed(1)+'</text>'
    +'<text x="'+(PL-3)+'" y="'+(PT+cH+5)+'" fill="#3e3e55" font-size="7" text-anchor="end">'+minV.toFixed(1)+'</text>'
    +(cible>=minV&&cible<=maxV?'<line x1="'+PL+'" y1="'+py(cible)+'" x2="'+(W-PR)+'" y2="'+py(cible)+'" stroke="var(--o)" stroke-width="1" stroke-dasharray="3,2"/>':"")
    +'<path d="'+fill+'" fill="url(#cg)"/>'
    +'<polyline points="'+pts+'" fill="none" stroke="var(--gold)" stroke-width="2"/>'
    +vals.map(function(v,i){return '<circle cx="'+px(i)+'" cy="'+py(v)+'" r="2.5" fill="var(--gold)"/>'+(i%step===0?'<text x="'+px(i)+'" y="'+(H-4)+'" fill="#3e3e55" font-size="6" text-anchor="middle">'+dates[i]+'</text>':""); }).join("")
    +'</svg>';
}

function addToJournal(nom, kcal, p, g, l){
  var today = new Date().toISOString().slice(0,10);
  var idx = calLog.findIndex(function(c){return c.date===today;});
  if(idx === -1){ calLog.push({date:today,kcal:0,p:0,g:0,l:0,repas:[]}); idx = calLog.length-1; }
  calLog[idx].kcal += kcal; calLog[idx].p += p; calLog[idx].g += g; calLog[idx].l += l;
  (calLog[idx].repas = calLog[idx].repas||[]).push({nom:nom,kcal:kcal,p:p,g:g,l:l});
  saveAll();
}
function delRepas(i){
  var today = new Date().toISOString().slice(0,10);
  var idx = calLog.findIndex(function(c){return c.date===today;}); if(idx===-1) return;
  var r = calLog[idx].repas[i];
  calLog[idx].kcal -= r.kcal; calLog[idx].p -= r.p; calLog[idx].g -= r.g; calLog[idx].l -= r.l;
  calLog[idx].repas.splice(i,1); saveAll(); renderNutriTab("repas");
}

      this.classList.add("on");

}

      var q = this.dataset.q;
      var idx = frigoList.indexOf(q);
      if(idx>=0) frigoList.splice(idx,1); else frigoList.push(q);
      renderNutriTab("frigo");
    });
  });
  document.getElementById("btn-gen-meal").addEventListener("click", genFrigoMeal);
}

function genFrigoMeal(){
  if(!frigoList.length){ toast("Ajoute des ingredients !","var(--r)"); return; }
  var obj = getObjDef();
  var res = document.getElementById("frigo-result");
  res.innerHTML = '<div class="ai-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span style="margin-left:4px;">L\'IA prepare ta recette...</span></div>';
  var prompt = "Tu es un chef nutritionniste expert en fitness. Objectif utilisateur : "+obj.nom+" ("+obj.desc+"). Macros cibles : "+obj.calories+" kcal, proteines "+obj.p+"g, glucides "+obj.g+"g, lipides "+obj.l+"g/jour.\n\nIngredients disponibles : "+frigoList.join(", ")+".\n\nCreer 1-2 recettes fitness adaptees a cet objectif avec uniquement ces ingredients (tu peux ajouter sel, poivre, herbes basiques). Pour chaque recette donnez : nom, temps, macros estimees, ingredients avec quantites, etapes courtes, et benefice pour l objectif. Format clair et lisible sur mobile.";
  fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:900,messages:[{role:"user",content:prompt}]})
  }).then(function(r){return r.json();}).then(function(data){
    var text = (data.content && data.content[0]) ? data.content[0].text : "Erreur de generation.";
    res.innerHTML = '<div class="al-gold mb8"><strong>&#127869;&#65039; Recette(s) generee(s) par l\'IA</strong></div><div class="ai-out">'+text+'</div>';
    var addBtn = document.createElement("button");
    addBtn.className = "btn btn-gold"; addBtn.style.marginTop = "10px";
    addBtn.textContent = "Ajouter au journal (estimation)";
    addBtn.addEventListener("click", function(){
      addToJournal("Repas Frigo IA ("+frigoList.slice(0,3).join(", ")+"...)", 420, 42, 32, 14);
      toast("Repas ajoute au journal !");
    });
    res.appendChild(addBtn);
  }).catch(function(){
    res.innerHTML = '<div class="al-b">Connexion IA indisponible. Verifie ta connexion internet.</div>';
  });
}

// ============================================================
// PROFILS
// ============================================================
function openProfilModal(){
  var h = '<div class="prof-grid">';
  Object.keys(profiles).forEach(function(pid){
    var p = profiles[pid];
    var isActive = pid === currentPid;
    h += '<div class="prof-card' + (isActive?' active':'') + '" data-switch="' + pid + '">';
    h += '<div style="font-size:28px;margin-bottom:4px;">' + (p.avatar||'&#128100;') + '</div>';
    h += '<div style="font-size:12px;font-weight:700;color:' + (isActive?'var(--gold)':'var(--tx)') + ';">' + (p.prenom||'Profil') + '</div>';
    h += '<div style="font-size:9px;color:var(--mu);margin-top:2px;">' + (p.objectif||'ventre_plat').replace(/_/g,' ') + '</div>';
    if(isActive) h += '<div style="font-size:10px;color:var(--gold);margin-top:4px;">&#10003; Actif</div>';
    h += '</div>';
  });
  h += '</div>';
  h += '<button class="btn btn-outline" id="btn-new-prof">+ Creer un profil</button>';
  document.getElementById("mo-profil-body").innerHTML = h;
  openSheet("mo-profil");
  document.querySelectorAll("[data-switch]").forEach(function(el){
    el.addEventListener("click", function(){
      currentPid = this.dataset.switch;
      localStorage.setItem("fs-current", currentPid);
      loadCurrentData();
      closeSheet("mo-profil");
      toast("Profil : " + profil.prenom, "var(--gold)");
      renderDashboard();
    });
  });
  document.getElementById("btn-new-prof").addEventListener("click", showNewProfForm);
}

function showNewProfForm(){
  var avatars = ['&#128100;','&#128102;','&#128103;','&#128104;','&#128105;','&#129473;','&#129474;','&#128113;'];
  var h = '<div class="mb8"><label class="lbl">Prenom</label><input type="text" id="np-prenom" class="inp" placeholder="Ex: Marie"></div>';
  h += '<div class="mb8"><label class="lbl">Avatar</label><div style="display:flex;flex-wrap:wrap;gap:6px;">';
  avatars.forEach(function(a){
    h += '<div data-av="'+a+'" style="font-size:24px;padding:6px;border-radius:8px;border:2px solid var(--bd);cursor:pointer;">'+a+'</div>';
  });
  h += '</div></div>';
  h += '<button class="btn btn-gold" id="btn-create-prof">Creer</button>';
  document.getElementById("mo-profil-body").innerHTML = h;
  var selAv = '&#128100;';
  document.querySelectorAll("[data-av]").forEach(function(el){
    el.addEventListener("click", function(){
      document.querySelectorAll("[data-av]").forEach(function(x){x.style.borderColor="var(--bd)";});
      this.style.borderColor = "var(--gold)";
      selAv = this.dataset.av;
    });
  });
  document.getElementById("btn-create-prof").addEventListener("click", function(){
    var prenom = document.getElementById("np-prenom").value.trim();
    if(!prenom){ toast("Entrez un prenom","var(--r)"); return; }
    var pid = "p_" + Date.now();
    profiles[pid] = Object.assign({}, DEFAULT_PROFIL, {prenom:prenom,avatar:selAv,id:pid});
    saveProfilesMeta();
    currentPid = pid; localStorage.setItem("fs-current", currentPid);
    loadCurrentData();
    closeSheet("mo-profil");
    openObjModal();
    toast("Profil cree : " + prenom, "var(--gold)");
    renderDashboard();
  });
}

// ============================================================
// OBJECTIFS MODAL
// ============================================================
function openObjModal(){
  var h = '<div class="al-gold mb8">Choisis un objectif pour adapter le programme et la nutrition.</div>';
  OBJECTIFS.forEach(function(obj){
    var isSel = (profil.objectif === obj.id);
    h += '<div class="obj-opt' + (isSel?' sel':'') + '" data-oid="' + obj.id + '">';
    h += '<h4>' + obj.emoji + ' ' + obj.nom + '</h4>';
    h += '<p>' + obj.desc + '</p>';
    h += '<p style="color:var(--gold);font-size:10px;margin-top:4px;">' + obj.conseil + '</p>';
    h += '<p style="color:var(--mu);font-size:10px;margin-top:2px;">' + obj.calories + ' kcal · P:' + obj.p + 'g · G:' + obj.g + 'g · L:' + obj.l + 'g</p>';
    h += '</div>';
  });
  h += '<button class="btn btn-gold" id="btn-save-obj" style="margin-top:4px;">Appliquer</button>';
  document.getElementById("mo-obj-body").innerHTML = h;
  openSheet("mo-obj");
  var selOid = profil.objectif || "ventre_plat";
  document.querySelectorAll("[data-oid]").forEach(function(el){
    el.addEventListener("click", function(){
      document.querySelectorAll("[data-oid]").forEach(function(x){x.classList.remove("sel");});
      this.classList.add("sel"); selOid = this.dataset.oid;
    });
  });
  document.getElementById("btn-save-obj").addEventListener("click", function(){
    var obj = OBJECTIFS.find(function(o){return o.id===selOid;}); if(!obj) return;
    profil.objectif = obj.id; profil.calories = obj.calories;
    profil.p = obj.p; profil.g = obj.g; profil.l = obj.l;
    saveAll(); closeSheet("mo-obj");
    toast("Objectif : " + obj.nom, "var(--gold)");
    renderDashboard();
  });
}

// ============================================================
// STATS
// ============================================================
function renderStats(){
  var h = "";
  h += '<div class="card"><div class="ct">Evolution du poids</div>' + poidsChart() + '</div>';
  var nbT = {muscu:0,cardio:0};
  seancesLog.forEach(function(s){ if(nbT[s.type]!==undefined) nbT[s.type]++; });
  h += '<div class="card"><div class="ct">Seances effectuees</div><div class="g4">';
  [{l:"Muscu",v:nbT.muscu,c:"var(--g)"},{l:"Cardio",v:nbT.cardio,c:"var(--r)"},{l:"Total",v:seancesLog.length,c:"var(--gold)"},{l:"Jours",v:joursEcoules(),c:"var(--p)"}].forEach(function(t){
    h += '<div class="kb"><div class="kv" style="color:'+t.c+';font-size:22px;">'+t.v+'</div><div class="kl">'+t.l+'</div></div>';
  });
  h += '</div></div>';
  h += '<div class="card"><div class="ct">Mon profil</div>';
  h += '<div class="mb8"><label class="lbl">Prenom</label><input type="text" id="st-prenom" class="inp" value="'+(profil.prenom||"")+'"></div>';
  h += '<div class="g2"><div><label class="lbl">Taille (cm)</label><input type="number" id="st-taille" class="inp" value="'+(profil.taille||170)+'"></div>';
  h += '<div><label class="lbl">Age</label><input type="number" id="st-age" class="inp" value="'+(profil.age||35)+'"></div></div>';
  h += '<div class="g2"><div><label class="lbl">Duree objectif (mois)</label><input type="number" id="st-mois" class="inp" value="'+(profil.objectifMois||5)+'"></div>';
  h += '<div><label class="lbl">Poids cible (kg)</label><input type="number" id="st-cib" class="inp" value="'+(profil.poidsCible||78)+'" step="0.1"></div></div>';
  h += '<div class="g2"><div><label class="lbl">Poids depart (kg)</label><input type="number" id="st-dep" class="inp" value="'+(profil.poidsDepart||85)+'" step="0.1"></div>';
  h += '<div><label class="lbl">Date depart</label><input type="date" id="st-date" class="inp" value="'+(profil.dateDepart||new Date().toISOString().slice(0,10))+'"></div></div>';
  h += '<button class="btn btn-gold mb8" id="btn-save-stats">Enregistrer</button>';
  h += '<button class="btn btn-outline" id="btn-open-obj-stats">&#127919; Changer mon objectif</button>';
  h += '</div>';
  var exos = Object.keys(chargesLog);
  h += '<div class="card"><div class="ct">Progression des charges</div>';
  if(exos.length){
    exos.slice(0,10).forEach(function(n){
      h += '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #111118;">';
      h += '<div style="font-size:12px;font-weight:600;">' + n + '</div>';
      h += '<div style="color:var(--gold);font-weight:700;">' + chargesLog[n] + ' kg</div></div>';
    });
  } else { h += '<div style="color:var(--mu);font-size:12px;text-align:center;padding:16px;">Enregistrez vos charges pendant les seances</div>'; }
  h += '</div>';
  h += '<div class="card" style="border-color:rgba(255,61,79,.2);">';
  h += '<div class="ct" style="color:var(--r);">Zone danger</div>';
  h += '<button class="btn btn-red" id="btn-reset">Reinitialiser ce profil</button>';
  h += '</div>';
  document.getElementById("page-stats").innerHTML = h;
  document.getElementById("btn-save-stats").addEventListener("click", function(){
    profil.objectifMois = parseInt(document.getElementById("st-mois").value)||5;
    profil.poidsCible = parseFloat(document.getElementById("st-cib").value)||78;
    profil.poidsDepart = parseFloat(document.getElementById("st-dep").value)||85;
    profil.dateDepart = document.getElementById("st-date").value;
    profil.prenom = document.getElementById("st-prenom").value;
    profil.taille = parseInt(document.getElementById("st-taille").value)||170;
    profil.age = parseInt(document.getElementById("st-age").value)||35;
    saveAll(); toast("Enregistre !"); renderDashboard();
  });
  document.getElementById("btn-open-obj-stats").addEventListener("click", openObjModal);
  document.getElementById("btn-reset").addEventListener("click", function(){
    if(!confirm("Effacer toutes les donnees de ce profil ?")) return;
    poidsLog=[]; chargesLog={}; seancesLog=[]; calLog=[]; alimentsCustom=[];
    profil = Object.assign({}, DEFAULT_PROFIL, {prenom:profil.prenom,id:currentPid});
    profiles[currentPid] = profil;
    saveAll(); toast("Reinitialise"); renderDashboard(); showPage("dashboard");
  });
}
