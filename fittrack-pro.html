<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#00c896">
<title>FitTrack Pro</title>
<style>
:root{--g:#00c896;--b:#3b82f6;--o:#f59e0b;--r:#ef4444;--p:#8b5cf6;--c:#06b6d4;--bg:#060a10;--card:#0d1520;--bd:#1e2d42;--tx:#e2e8f0;--mu:#56637a;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,'Segoe UI',sans-serif;font-size:14px;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:74px;}
input,select,button,textarea{font-family:inherit;font-size:14px;}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#08090f;border-top:1px solid var(--bd);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nb{flex:1;padding:8px 2px 6px;background:transparent;border:none;color:var(--mu);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:700;text-transform:uppercase;}
.nb.active{color:var(--g);}
.ni{font-size:20px;line-height:1.2;}
#hdr{background:linear-gradient(135deg,#0d1f1a,#08090f);padding:12px 16px 10px;border-bottom:1px solid #0e1b2a;position:sticky;top:0;z-index:50;}
.ht{font-size:17px;font-weight:800;color:var(--g);letter-spacing:1px;}
.hs{font-size:11px;color:#3d5268;margin-top:1px;}
.pg{display:none;padding:12px;}
.pg.active{display:block;}
.card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:14px;margin-bottom:10px;}
.ct{font-size:10px;color:#5b7a9e;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:10px;}
.kpi2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.kpi4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
.kb{background:var(--bg);border-radius:10px;padding:10px;text-align:center;border:1px solid var(--bd);}
.kv{font-size:20px;font-weight:800;line-height:1;}
.kl{font-size:9px;color:var(--mu);margin-top:3px;}
.inp{background:var(--bg);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:9px 11px;width:100%;}
.inp:focus{outline:none;border-color:#00c89666;}
.lbl{display:block;font-size:10px;color:#5b7a9e;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;font-weight:700;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.mb10{margin-bottom:10px;}
.btn{width:100%;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;}
.btn-p{background:linear-gradient(90deg,var(--g),#0066cc);color:#fff;}
.btn-s{background:#0d1f2e;border:1px solid #00c89644;color:var(--g);}
.btn-o{background:#2d1a00;border:1px solid #f59e0b44;color:var(--o);}
.btn-r{background:#2d0a0a;border:1px solid #ef444444;color:var(--r);}
.tag{border-radius:20px;padding:3px 9px;font-size:10px;font-weight:700;display:inline-block;}
.tg{background:#0a1f18;border:1px solid #00c89644;color:var(--g);}
.to{background:#2d1a00;border:1px solid #f59e0b44;color:var(--o);}
.tb{background:#0a1530;border:1px solid #3b82f644;color:var(--b);}
.tr{background:#2d0a0a;border:1px solid #ef444444;color:var(--r);}
.tp{background:#1a0a30;border:1px solid #8b5cf644;color:var(--p);}
.pt{background:var(--bg);border-radius:20px;height:8px;overflow:hidden;}
.pf{height:100%;border-radius:20px;transition:width .5s;}
.wg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:10px;}
.dp{border-radius:8px;padding:6px 2px;text-align:center;cursor:pointer;border:1px solid var(--bd);}
.dp.muscu{border-color:var(--g);background:#0a1f18;}
.dp.cardio{border-color:var(--r);background:#2d0a0a;}
.dp.renfo{border-color:var(--p);background:#1a0a30;}
.dp.repos{opacity:.4;}
.dj{font-size:9px;color:var(--mu);font-weight:700;}
.di{font-size:13px;margin-top:1px;}
.cb{width:28px;height:28px;border-radius:8px;border:2px solid var(--bd);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.cb.done{border-color:var(--g);background:var(--g);color:#fff;}
.alert-g{background:#0a1f18;border:1px solid #00c89633;border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:12px;line-height:1.6;color:var(--g);}
.alert-o{background:#2d1a00;border:1px solid #f59e0b33;border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:12px;line-height:1.6;color:var(--o);}
.alert-b{background:#0a1530;border:1px solid #3b82f633;border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:12px;line-height:1.6;color:var(--b);}
.macro-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.mo{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000000cc;z-index:200;align-items:flex-end;justify-content:center;}
.mo.open{display:flex;}
.mb2{background:var(--card);border:1px solid var(--bd);border-radius:18px 18px 0 0;padding:20px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom));}
#timer-ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000000ee;z-index:300;align-items:center;justify-content:center;}
#timer-ov.open{display:flex;}
.t-circle{width:180px;height:180px;border-radius:50%;border:6px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;background:var(--card);}
.t-svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.t-num{font-size:48px;font-weight:800;color:var(--g);font-variant-numeric:tabular-nums;}
#toast{display:none;position:fixed;top:68px;left:50%;transform:translateX(-50%);background:var(--card);border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;z-index:999;white-space:nowrap;}
.food-chip{display:inline-flex;align-items:center;gap:5px;background:#0a1f18;border:1px solid #00c89633;border-radius:20px;padding:4px 10px;margin:3px;font-size:11px;cursor:pointer;}
.food-chip.selected{background:#00c89622;border-color:var(--g);color:var(--g);}
.meal-card{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;}
.meal-card:active{border-color:var(--g);}
.meal-title{font-size:14px;font-weight:700;color:var(--tx);margin-bottom:4px;}
.meal-meta{font-size:11px;color:var(--mu);}
.meal-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.obj-bar{background:linear-gradient(135deg,#0a1f18,#0d1520);border:1px solid #00c89633;border-radius:14px;padding:14px;margin-bottom:10px;}
.seance-chip{padding:6px 12px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--mu);cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;}
.seance-chip.active{border-color:var(--g);background:#0a1f18;color:var(--g);}
</style>
</head>
<body>
<div id="hdr">
  <div style="display:flex;align-items:center;justify-content:space-between;">
    <div style="display:flex;align-items:center;gap:10px;">
      <svg width="40" height="40" viewBox="0 0 40 40" style="flex-shrink:0;">
        <rect width="40" height="40" rx="11" fill="url(#hg)"/>
        <defs><linearGradient id="hg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00c896"/><stop offset="100%" stop-color="#0066cc"/></linearGradient></defs>
        <rect x="4" y="18" width="7" height="4" rx="2" fill="#fff" opacity=".9"/>
        <rect x="4" y="14" width="4" height="12" rx="2" fill="#fff" opacity=".8"/>
        <rect x="11" y="19" width="18" height="2" rx="1" fill="#fff"/>
        <rect x="29" y="18" width="7" height="4" rx="2" fill="#fff" opacity=".9"/>
        <rect x="32" y="14" width="4" height="12" rx="2" fill="#fff" opacity=".8"/>
        <polyline points="13,12 15,9 17,13 19,7 21,13 23,10 27,12" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity=".7"/>
      </svg>
      <div><div class="ht">FitTrack Pro</div><div class="hs" id="hs">Chargement...</div></div>
    </div>
    <div id="hdr-obj" style="font-size:10px;font-weight:700;color:var(--o);text-align:right;"></div>
  </div>
</div>

<div id="page-dashboard" class="pg active"></div>
<div id="page-programme" class="pg"></div>
<div id="page-seance" class="pg"></div>
<div id="page-nutrition" class="pg"></div>
<div id="page-stats" class="pg"></div>

<nav id="nav">
  <button class="nb active" data-page="dashboard"><span class="ni">&#128200;</span>Accueil</button>
  <button class="nb" data-page="programme"><span class="ni">&#128197;</span>Plan</button>
  <button class="nb" data-page="seance"><span class="ni">&#127947;</span>Seance</button>
  <button class="nb" data-page="nutrition"><span class="ni">&#129367;</span>Nutrition</button>
  <button class="nb" data-page="stats"><span class="ni">&#128202;</span>Stats</button>
</nav>

<div id="timer-ov">
  <div style="text-align:center;padding:20px;">
    <div style="font-size:13px;color:var(--mu);margin-bottom:12px;" id="t-name"></div>
    <div class="t-circle">
      <svg class="t-svg" width="180" height="180">
        <circle cx="90" cy="90" r="82" fill="none" stroke="#1e2d42" stroke-width="6"/>
        <circle cx="90" cy="90" r="82" fill="none" stroke="var(--g)" stroke-width="6" stroke-dasharray="515" stroke-dashoffset="0" id="t-arc" stroke-linecap="round"/>
      </svg>
      <div class="t-num" id="t-num">00</div>
      <div style="font-size:11px;color:var(--mu);" id="t-lbl">sec</div>
    </div>
    <div style="margin-top:18px;display:flex;gap:10px;justify-content:center;">
      <button class="btn btn-s" style="width:110px;" id="t-pause-btn" onclick="pauseTimer()">Pause</button>
      <button class="btn btn-r" style="width:110px;" onclick="stopTimer()">Arreter</button>
    </div>
  </div>
</div>

<div id="mo-exo" class="mo" onclick="closeMo('mo-exo')">
  <div class="mb2" onclick="event.stopPropagation()">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div style="font-size:16px;font-weight:800;" id="mo-title"></div>
      <button onclick="closeMo('mo-exo')" style="background:var(--bd);border:none;color:var(--tx);border-radius:50%;width:30px;height:30px;cursor:pointer;">x</button>
    </div>
    <div id="mo-content"></div>
  </div>
</div>

<div id="mo-meal" class="mo" onclick="closeMo('mo-meal')">
  <div class="mb2" onclick="event.stopPropagation()">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div style="font-size:16px;font-weight:800;" id="mo-meal-title">Recette</div>
      <button onclick="closeMo('mo-meal')" style="background:var(--bd);border:none;color:var(--tx);border-radius:50%;width:30px;height:30px;cursor:pointer;">x</button>
    </div>
    <div id="mo-meal-content"></div>
  </div>
</div>

<div id="toast"></div>

// ── HELPERS ──────────────────────────────────────────────────────────────
function dernierPoids(){return poidsLog.length?poidsLog[poidsLog.length-1].poids:(profil.poidsDepart||85);}
function imc(){var h=(profil.taille||170)/100;return(dernierPoids()/(h*h)).toFixed(1);}
function poidsPerdu(){return Math.max(0,((profil.poidsDepart||85)-dernierPoids())).toFixed(1);}
function poidsRestant(){return Math.max(0,(dernierPoids()-(profil.poidsCible||78))).toFixed(1);}
function progPct(){var tot=(profil.poidsDepart||85)-(profil.poidsCible||78);var fait=(profil.poidsDepart||85)-dernierPoids();return tot>0?Math.min(100,Math.round(fait/tot*100)):0;}
function joursEcoules(){return Math.max(0,Math.floor((new Date()-new Date(profil.dateDepart||new Date()))/86400000));}
function todayJour(){return["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"][new Date().getDay()];}
function todaySeance(){return PROGRAMME.find(function(p){return p.jour===todayJour();})||PROGRAMME[0];}
function nbSeancesSem(){
  var lundi=new Date();lundi.setDate(lundi.getDate()-((lundi.getDay()+6)%7));lundi.setHours(0,0,0,0);
  var fin=new Date(lundi);fin.setDate(fin.getDate()+6);
  return seancesLog.filter(function(s){var d=new Date(s.date);return d>=lundi&&d<=fin;}).length;
}
function parseTimer(r){
  var m=String(r).match(/(\d+)(?:-\d+)?\s*sec/i);if(m)return parseInt(m[1]);
  var m2=String(r).match(/(\d+)\s*min/i);if(m2)return parseInt(m2[1])*60;
  return 0;
}

// ── TIMER ──────────────────────────────────────────────────────────────
function startTimer(secs,label){
  timerTotal=secs;timerRemaining=secs;timerPaused=false;
  document.getElementById("t-name").textContent=label||"";
  document.getElementById("timer-ov").classList.add("open");
  document.getElementById("t-pause-btn").textContent="Pause";
  updateTimerDisplay();
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(function(){
    if(timerPaused)return;
    timerRemaining--;updateTimerDisplay();
    if(timerRemaining<=0){
      clearInterval(timerInterval);
      document.getElementById("timer-ov").classList.remove("open");
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
      showToast("Temps ecoule !","var(--g)");
    }
  },1000);
}
function updateTimerDisplay(){
  var m=Math.floor(timerRemaining/60),s=timerRemaining%60;
  document.getElementById("t-num").textContent=timerRemaining>=60?(m+":"+(s<10?"0":"")+s):String(timerRemaining);
  document.getElementById("t-lbl").textContent=timerRemaining>=60?"min":"sec";
  var pct=timerTotal>0?timerRemaining/timerTotal:0;
  var circ=2*Math.PI*82;
  document.getElementById("t-arc").setAttribute("stroke-dashoffset",String(circ*(1-pct)));
  var col=timerRemaining>timerTotal*0.5?"var(--g)":timerRemaining>timerTotal*0.25?"var(--o)":"var(--r)";
  document.getElementById("t-arc").setAttribute("stroke",col);
  document.getElementById("t-num").style.color=col;
}
function pauseTimer(){timerPaused=!timerPaused;document.getElementById("t-pause-btn").textContent=timerPaused?"Reprendre":"Pause";}
function stopTimer(){clearInterval(timerInterval);document.getElementById("timer-ov").classList.remove("open");}

// ── POIDS CHART ──────────────────────────────────────────────────────────
function poidsChart(){
  if(poidsLog.length<2)return "<div style='color:#3d4a5c;text-align:center;padding:20px;font-size:12px;'>Enregistrez votre poids pour voir la courbe</div>";
  var vals=poidsLog.slice(-14).map(function(p){return p.poids;});
  var dates=poidsLog.slice(-14).map(function(p){return p.date.slice(5);});
  var W=300,H=100,PL=32,PR=12,PT=10,PB=22,cW=W-PL-PR,cH=H-PT-PB;
  var cible=profil.poidsCible||78;
  var minV=Math.min.apply(null,vals.concat([cible]))-0.5;
  var maxV=Math.max.apply(null,vals)+0.5;
  var xS=cW/Math.max(vals.length-1,1);
  function px(i){return PL+i*xS;}
  function py(v){return PT+cH-(v-minV)/(maxV-minV)*cH;}
  var pts=vals.map(function(v,i){return px(i)+","+py(v);}).join(" ");
  var fill="M"+px(0)+","+py(vals[0]);for(var i=1;i<vals.length;i++)fill+=" L"+px(i)+","+py(vals[i]);
  fill+=" L"+px(vals.length-1)+","+(PT+cH)+" L"+px(0)+","+(PT+cH)+" Z";
  var step=Math.ceil(vals.length/5);
  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px;">'
    +'<defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00c896" stop-opacity="0.3"/><stop offset="100%" stop-color="#00c896" stop-opacity="0"/></linearGradient></defs>'
    +'<line x1="'+PL+'" y1="'+PT+'" x2="'+PL+'" y2="'+(PT+cH)+'" stroke="#1e2d42" stroke-width="1"/>'
    +'<text x="'+(PL-3)+'" y="'+(PT+5)+'" fill="#5b7a9e" font-size="8" text-anchor="end">'+maxV.toFixed(1)+'</text>'
    +'<text x="'+(PL-3)+'" y="'+(PT+cH+5)+'" fill="#5b7a9e" font-size="8" text-anchor="end">'+minV.toFixed(1)+'</text>'
    +(cible>=minV&&cible<=maxV?'<line x1="'+PL+'" y1="'+py(cible)+'" x2="'+(W-PR)+'" y2="'+py(cible)+'" stroke="var(--o)" stroke-width="1" stroke-dasharray="4,2"/><text x="'+(W-PR+2)+'" y="'+(py(cible)+4)+'" fill="var(--o)" font-size="7">'+cible+'</text>':"")
    +'<path d="'+fill+'" fill="url(#wg)"/>'
    +'<polyline points="'+pts+'" fill="none" stroke="var(--g)" stroke-width="2.5"/>'
    +vals.map(function(v,i){return'<circle cx="'+px(i)+'" cy="'+py(v)+'" r="3" fill="var(--g)"/>'+(i%step===0?'<text x="'+px(i)+'" y="'+(H-5)+'" fill="#5b7a9e" font-size="7" text-anchor="middle">'+dates[i]+'</text>':"");}).join("")
    +'</svg>';
  return svg;
}

}

function getAllAliments(){
  var all=[];
  Object.values(ALIMENTS_BASE).forEach(function(cat){cat.forEach(function(a){all.push(a);});});
  alimentsCustom.forEach(function(a){all.push(a);});
  return all;
}
function getRepasForObjectif(){
  return REPAS_DB.filter(function(r){
    if(profil.objectif==="ventre_plat") return r.tags.indexOf("ventre plat")>=0||r.tags.indexOf("seche")>=0;
    return true;
  });
}
function getMealsWithAliments(alims){
  if(!alims||!alims.length) return REPAS_DB;
  return REPAS_DB.filter(function(r){
    return alims.some(function(a){
      return r.ingredients.some(function(ing){return ing.toLowerCase().indexOf(a.toLowerCase())>=0;});
    });
  });
}

    // Boissons recommandees
    h+='<div class="card"><div class="ct">Boissons recommandees ventre plat</div>';
    var boissons=ALIMENTS_BASE.boissons.filter(function(b){return b.kcal<20;});
    boissons.forEach(function(b){
      h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #0e1b2a;">';
      h+='<div><div style="font-size:12px;font-weight:600;color:#c9d1d9;">'+b.nom+'</div></div>';
      h+='<div style="display:flex;gap:6px;align-items:center;"><span style="color:var(--g);font-size:11px;">'+b.kcal+' kcal</span>';
      h+='<button class="btn btn-s" style="width:auto;padding:4px 8px;font-size:10px;" data-add-boisson="'+b.nom+'" data-bk="'+b.kcal+'" data-bp="'+b.p+'" data-bg="'+b.g+'" data-bl="'+b.l+'">+</button></div></div>';
    });
    h+='</div>';
    document.getElementById("nutri-content").innerHTML=h;
    document.getElementById("btn-add-repas").addEventListener("click",addRepas);
    document.querySelectorAll("[data-del-repas]").forEach(function(b){
      b.addEventListener("click",function(){delRepas(parseInt(this.dataset.delRepas));});
    });
    document.querySelectorAll("[data-add-boisson]").forEach(function(b){
      b.addEventListener("click",function(){
        addRepasAuto(this.dataset.addBoisson,parseInt(this.dataset.bk),parseInt(this.dataset.bp),parseInt(this.dataset.bg),parseInt(this.dataset.bl));
      });
    });

  } else if(tab==="suggestions"){
    h+='<div class="alert-g" style="margin-bottom:10px;"><strong>Objectif : '+( profil.objectif==="ventre_plat"?"Ventre plat & tonus":"Perte de poids")+'</strong><br>Repas adaptes pour bruler les graisses rapidement et reduire le ventre.</div>';
    // Selector aliments favoris
    h+='<div class="card"><div class="ct">Filtrer par aliments que j\'ai</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;" id="alim-chips">';
    var topAlims=["Poulet","Oeuf","Saumon","Thon","Fromage blanc","Yaourt grec","Riz","Flocons avoine","Brocoli","Avocat"];
    topAlims.forEach(function(a){
      var sel=profil.alimentsFavoris&&profil.alimentsFavoris.indexOf(a)>=0;
      h+='<div class="food-chip'+(sel?" selected":"")+'" data-alim="'+a+'">'+a+'</div>';
    });
    h+='</div></div>';
    // Repas suggeres
    var repasFiltre=getMealsWithAliments(profil.alimentsFavoris&&profil.alimentsFavoris.length?profil.alimentsFavoris:null);
    var moments=["Petit-dejeuner","Dejeuner","Collation","Diner"];
    moments.forEach(function(m){
      var repas=repasFiltre.filter(function(r){return r.moment===m;});
      if(!repas.length)return;
      h+='<div class="ct">'+m+'</div>';
      repas.forEach(function(r){
        h+='<div class="meal-card" data-meal-id="'+r.id+'">';
        h+='<div style="display:flex;align-items:center;justify-content:space-between;">';
        h+='<div class="meal-title">'+r.nom+'</div>';
        h+='<div style="font-size:11px;color:var(--g);font-weight:700;">'+r.kcal+' kcal</div></div>';
        h+='<div class="meal-meta">'+r.temps+' min · P:'+r.p+'g G:'+r.g+'g L:'+r.l+'g</div>';
        h+='<div class="meal-tags">';
        r.tags.forEach(function(t){h+='<span class="tag tg" style="font-size:9px;padding:2px 7px;">'+t+'</span>';});
        h+='</div></div>';
      });
    });
    document.getElementById("nutri-content").innerHTML=h;
    document.querySelectorAll(".food-chip").forEach(function(c){
      c.addEventListener("click",function(){
        var a=this.dataset.alim;
        if(!profil.alimentsFavoris)profil.alimentsFavoris=[];
        var idx=profil.alimentsFavoris.indexOf(a);
        if(idx>=0)profil.alimentsFavoris.splice(idx,1);else profil.alimentsFavoris.push(a);
        saveAll();renderNutriTab("suggestions");
      });
    });
    document.querySelectorAll(".meal-card").forEach(function(c){
      c.addEventListener("click",function(){openMealModal(this.dataset.mealId);});
    });

  } else if(tab==="aliments"){
    h+='<div class="card"><div class="ct">Ajouter un aliment personnalise</div>';
    h+='<div class="mb10"><label class="lbl">Nom</label><input type="text" id="ca-nom" class="inp" placeholder="Mon aliment"></div>';
    h+='<div class="fg2"><div><label class="lbl">Calories</label><input type="number" id="ca-k" class="inp" placeholder="kcal"></div>';
    h+='<div><label class="lbl">Proteines (g)</label><input type="number" id="ca-p" class="inp" placeholder="g"></div></div>';
    h+='<div class="fg2"><div><label class="lbl">Glucides (g)</label><input type="number" id="ca-g" class="inp" placeholder="g"></div>';
    h+='<div><label class="lbl">Lipides (g)</label><input type="number" id="ca-l" class="inp" placeholder="g"></div></div>';
    h+='<button class="btn btn-p" id="btn-add-aliment">Ajouter a ma liste</button></div>';
    // Liste aliments par categorie
    var cats={Proteines:ALIMENTS_BASE.proteines,Glucides:ALIMENTS_BASE.glucides,Legumes:ALIMENTS_BASE.legumes,Lipides:ALIMENTS_BASE.lipides,Boissons:ALIMENTS_BASE.boissons};
    if(alimentsCustom.length){cats["Mes aliments"]=alimentsCustom;}
    Object.keys(cats).forEach(function(cat){
      h+='<div class="ct">'+cat+'</div>';
      h+='<div class="card">';
      cats[cat].forEach(function(a,ai){
        h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #0e1b2a;">';
        h+='<div><div style="font-size:12px;font-weight:600;color:#c9d1d9;">'+a.nom+'</div>';
        h+='<div style="font-size:10px;color:var(--mu);">P:'+a.p+'g G:'+a.g+'g L:'+a.l+'g</div></div>';
        h+='<div style="display:flex;gap:6px;align-items:center;">';
        h+='<span style="color:var(--g);font-size:11px;font-weight:700;">'+a.kcal+' kcal</span>';
        if(cat==="Mes aliments"){
          h+='<button class="btn btn-r" style="width:auto;padding:3px 7px;font-size:10px;" data-del-aliment="'+ai+'">x</button>';
        }
        h+='</div></div>';
      });
      h+='</div>';
    });
    document.getElementById("nutri-content").innerHTML=h;
    document.getElementById("btn-add-aliment").addEventListener("click",addAlimentCustom);
    document.querySelectorAll("[data-del-aliment]").forEach(function(b){
      b.addEventListener("click",function(){
        alimentsCustom.splice(parseInt(this.dataset.delAliment),1);
        saveAll();renderNutriTab("aliments");
      });
    });
  }
}

function openMealModal(id){
  var r=REPAS_DB.find(function(x){return x.id===id;});
  if(!r)return;
  document.getElementById("mo-meal-title").textContent=r.nom;
  var h="";
  h+='<div style="display:flex;gap:8px;margin-bottom:12px;">';
  r.tags.forEach(function(t){h+='<span class="tag tg" style="font-size:10px;">'+t+'</span>';});
  h+='</div>';
  h+='<div style="background:var(--bg);border-radius:8px;padding:10px;margin-bottom:10px;display:flex;justify-content:space-around;text-align:center;">';
  h+='<div><div style="font-size:20px;font-weight:800;color:var(--g);">'+r.kcal+'</div><div style="font-size:9px;color:var(--mu);">kcal</div></div>';
  h+='<div><div style="font-size:20px;font-weight:800;color:var(--b);">'+r.p+'g</div><div style="font-size:9px;color:var(--mu);">prot</div></div>';
  h+='<div><div style="font-size:20px;font-weight:800;color:var(--o);">'+r.g+'g</div><div style="font-size:9px;color:var(--mu);">gluc</div></div>';
  h+='<div><div style="font-size:20px;font-weight:800;color:var(--r);">'+r.l+'g</div><div style="font-size:9px;color:var(--mu);">lip</div></div>';
  h+='<div><div style="font-size:20px;font-weight:800;color:var(--p);">'+r.temps+'</div><div style="font-size:9px;color:var(--mu);">min</div></div>';
  h+='</div>';
  h+='<div class="ct">Ingredients</div>';
  h+='<div style="background:var(--bg);border-radius:8px;padding:10px;margin-bottom:10px;">';
  r.ingredients.forEach(function(ing){h+='<div style="padding:4px 0;font-size:13px;color:#c9d1d9;">&#8226; '+ing+'</div>';});
  h+='</div>';
  h+='<div class="ct">Preparation ('+r.temps+' min)</div>';
  h+='<div class="alert-b" style="margin-bottom:10px;font-size:13px;line-height:1.7;">'+r.recette+'</div>';
  h+='<div class="ct">Pourquoi ce repas</div>';
  h+='<div class="alert-g" style="margin-bottom:12px;font-size:12px;">'+r.pourquoi+'</div>';
  h+='<button class="btn btn-p" id="btn-add-meal">Ajouter au journal du jour</button>';
  document.getElementById("mo-meal-content").innerHTML=h;
  openMo("mo-meal");
  document.getElementById("btn-add-meal").addEventListener("click",function(){
    addRepasAuto(r.nom,r.kcal,r.p,r.g,r.l);
    closeMo("mo-meal");showToast(r.nom+" ajoute au journal !");
  });
}

function addRepas(){
  var nom=(document.getElementById("n-nom").value||"").trim();
  var k=parseInt(document.getElementById("n-k").value)||0;
  var p2=parseInt(document.getElementById("n-p").value)||0;
  var g2=parseInt(document.getElementById("n-g").value)||0;
  var l2=parseInt(document.getElementById("n-l").value)||0;
  if(!nom||!k){showToast("Nom et calories requis","var(--r)");return;}
  addRepasAuto(nom,k,p2,g2,l2);
  showToast("Ajoute !");renderNutriTab("repas");
}
function addRepasAuto(nom,k,p2,g2,l2){
  var today=new Date().toISOString().split("T")[0];
  var idx=calLog.findIndex(function(c){return c.date===today;});
  if(idx===-1){calLog.push({date:today,kcal:0,proteines:0,glucides:0,lipides:0,repas:[]});idx=calLog.length-1;}
  calLog[idx].kcal+=k;calLog[idx].proteines+=p2;calLog[idx].glucides+=g2;calLog[idx].lipides+=l2;
  (calLog[idx].repas=calLog[idx].repas||[]).push({nom:nom,kcal:k,prot:p2,gluc:g2,lip:l2});
  saveAll();
}
function delRepas(i){
  var today=new Date().toISOString().split("T")[0];
  var idx=calLog.findIndex(function(c){return c.date===today;});if(idx===-1)return;
  var r=calLog[idx].repas[i];
  calLog[idx].kcal-=r.kcal;calLog[idx].proteines-=r.prot;calLog[idx].glucides-=r.gluc;calLog[idx].lipides-=r.lip;
  calLog[idx].repas.splice(i,1);saveAll();renderNutriTab("repas");
}
function addAlimentCustom(){
  var nom=(document.getElementById("ca-nom").value||"").trim();
  var k=parseInt(document.getElementById("ca-k").value)||0;
  var p2=parseInt(document.getElementById("ca-p").value)||0;
  var g2=parseInt(document.getElementById("ca-g").value)||0;
  var l2=parseInt(document.getElementById("ca-l").value)||0;
  if(!nom||!k){showToast("Nom et calories requis","var(--r)");return;}
  alimentsCustom.push({nom:nom,kcal:k,p:p2,g:g2,l:l2,categorie:"Personnalise"});
  saveAll();showToast(nom+" ajoute !");renderNutriTab("aliments");
}

function renderStats(){
  var h="";
  h+='<div class="card"><div class="ct">Evolution du poids</div>'+poidsChart()+'</div>';
  var nbParType={muscu:0,cardio:0,renfo:0,repos:0};
  seancesLog.forEach(function(s){if(nbParType[s.type]!==undefined)nbParType[s.type]++;});
  h+='<div class="card"><div class="ct">Seances effectuees</div>';
  h+='<div class="kpi4">';
  [{l:"Muscu",k:"muscu",c:"var(--g)"},{l:"Cardio",k:"cardio",c:"var(--r)"},{l:"Total",k:"total",c:"var(--b)"},{l:"Jours",k:"jours",c:"var(--p)"}].forEach(function(t){
    h+='<div class="kb"><div class="kv" style="color:'+t.c+';font-size:18px;">'+(t.k==="total"?seancesLog.length:t.k==="jours"?joursEcoules():nbParType[t.k])+'</div><div class="kl">'+t.l+'</div></div>';
  });
  h+='</div></div>';
  h+='<div class="card"><div class="ct">Objectifs</div>';
  h+='<div class="fg2">';
  h+='<div><label class="lbl">Objectif (mois)</label><input type="number" id="st-mois" class="inp" value="'+(profil.objectifMois||5)+'"></div>';
  h+='<div><label class="lbl">Poids cible (kg)</label><input type="number" id="st-cib" class="inp" value="'+(profil.poidsCible||78)+'" step="0.1"></div>';
  h+='</div>';
  h+='<div class="fg2">';
  h+='<div><label class="lbl">Poids depart (kg)</label><input type="number" id="st-dep" class="inp" value="'+(profil.poidsDepart||85)+'" step="0.1"></div>';
  h+='<div><label class="lbl">Date depart</label><input type="date" id="st-date" class="inp" value="'+(profil.dateDepart||new Date().toISOString().split("T")[0])+'"></div>';
  h+='</div>';
  h+='<div class="mb10"><label class="lbl">Objectif principal</label>';
  h+='<select id="st-obj" class="inp"><option value="ventre_plat"'+(profil.objectif==="ventre_plat"?" selected":"")+'>Ventre plat & tonus</option>';
  h+='<option value="perte_poids"'+(profil.objectif==="perte_poids"?" selected":"")+'>Perte de poids</option></select></div>';
  h+='<div class="mb10"><label class="lbl">Prenom</label><input type="text" id="st-prenom" class="inp" value="'+(profil.prenom||"")+'"></div>';
  h+='<button class="btn btn-p" id="btn-save-stats">Enregistrer</button></div>';
  h+='<div class="card"><div class="ct">Progression charges</div>';
  var exos=Object.keys(chargesLog);
  if(exos.length){
    exos.slice(0,8).forEach(function(n){
      h+='<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #0e1b2a;">';
      h+='<div style="font-size:12px;font-weight:600;color:#c9d1d9;">'+n+'</div>';
      h+='<div style="color:var(--g);font-weight:700;">'+chargesLog[n]+' kg</div></div>';
    });
  }else{h+='<div style="color:var(--mu);font-size:12px;text-align:center;padding:16px;">Enregistrez vos charges pendant les seances</div>';}
  h+='</div>';
  h+='<div class="card" style="border-color:#ef444422;">';
  h+='<div class="ct" style="color:var(--r);">Zone danger</div>';
  h+='<button class="btn btn-r" style="padding:10px;" id="btn-reset">Reinitialiser toutes les donnees</button></div>';
  document.getElementById("page-stats").innerHTML=h;
  document.getElementById("btn-save-stats").addEventListener("click",function(){
    profil.objectifMois=parseInt(document.getElementById("st-mois").value)||5;
    profil.poidsCible=parseFloat(document.getElementById("st-cib").value)||78;
    profil.poidsDepart=parseFloat(document.getElementById("st-dep").value)||85;
    profil.dateDepart=document.getElementById("st-date").value;
    profil.objectif=document.getElementById("st-obj").value;
    profil.prenom=document.getElementById("st-prenom").value;
    saveAll();showToast("Enregistre !");renderDashboard();
  });
  document.getElementById("btn-reset").addEventListener("click",function(){
    if(!confirm("Supprimer toutes les donnees ?"))return;
    poidsLog=[];chargesLog={};seancesLog=[];calLog=[];alimentsCustom=[];
    profil=Object.assign({},DEFAULT_PROFIL);saveAll();showToast("Reinitialise");renderDashboard();showPage("dashboard");
  });
}
