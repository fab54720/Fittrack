<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060a10">
<title>FitTrack Pro</title>
<link rel="manifest" href="#" id="manifest-link">
<style>
:root{--green:#00c896;--blue:#3b82f6;--orange:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--cyan:#06b6d4;--bg:#060a10;--card:#0d1520;--border:#1e2d42;--text:#e2e8f0;--muted:#56637a;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',sans-serif;font-size:14px;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:72px;overflow-x:hidden;}
input,select,button,textarea{font-family:inherit;font-size:14px;}
/* NAV */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#08090f;border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nb{flex:1;padding:8px 2px 6px;background:transparent;border:none;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:700;text-transform:uppercase;}
.nb.active{color:var(--green);}
.ni{font-size:22px;line-height:1.2;}
/* HEADER */
#hdr{background:linear-gradient(135deg,#0d1f1a,#08090f);padding:12px 16px 10px;border-bottom:1px solid #0e1b2a;position:sticky;top:0;z-index:50;}
.ht{font-size:17px;font-weight:800;color:var(--green);letter-spacing:1px;}
.hs{font-size:11px;color:#3d5268;margin-top:1px;}
/* PAGES */
.pg{display:none;padding:12px;}
.pg.active{display:block;}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
.ct{font-size:10px;color:#5b7a9e;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:10px;}
/* INPUTS */
.inp{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 11px;width:100%;}
.inp:focus{outline:none;border-color:#00c89666;}
.lbl{display:block;font-size:10px;color:#5b7a9e;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;font-weight:700;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.mb10{margin-bottom:10px;}
/* BUTTONS */
.btn{width:100%;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.btn:active{opacity:.8;}
.btn-p{background:linear-gradient(90deg,var(--green),#0066cc);color:#fff;}
.btn-s{background:#0d1f2e;border:1px solid #00c89644;color:var(--green);}
.btn-o{background:#2d1a00;border:1px solid #f59e0b44;color:var(--orange);}
.btn-d{background:#2d0a0a;border:1px solid #ef444444;color:var(--red);}
/* TAGS */
.tag{border-radius:20px;padding:2px 9px;font-size:10px;font-weight:700;display:inline-block;}
.tg{background:#0a1f18;border:1px solid #00c89644;color:var(--green);}
.tr{background:#2d0a0a;border:1px solid #ef444444;color:var(--red);}
.to{background:#2d1a00;border:1px solid #f59e0b44;color:var(--orange);}
.tb{background:#0a1530;border:1px solid #3b82f644;color:var(--blue);}
.tp{background:#1a0a30;border:1px solid #8b5cf644;color:var(--purple);}
/* PROGRESS */
.pt{background:#060a10;border-radius:20px;height:8px;overflow:hidden;}
.pf{height:100%;border-radius:20px;transition:width .5s;}
/* KPI */
.kpi2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.kpi4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
.kb{background:var(--bg);border-radius:10px;padding:10px;text-align:center;border:1px solid var(--border);}
.kv{font-size:20px;font-weight:800;line-height:1;}
.kl{font-size:9px;color:var(--muted);margin-top:3px;}
/* SEANCE */
.cb{width:28px;height:28px;border-radius:8px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .15s;}
.cb.done{border-color:var(--green);background:var(--green);color:#fff;}
/* TIMER */
#timer-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000000ee;z-index:300;align-items:center;justify-content:center;flex-direction:column;}
#timer-overlay.open{display:flex;}
.timer-circle{width:180px;height:180px;border-radius:50%;border:6px solid var(--border);display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;background:#0d1520;}
.timer-svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.timer-num{font-size:48px;font-weight:800;color:var(--green);font-variant-numeric:tabular-nums;}
.timer-lbl{font-size:12px;color:var(--muted);margin-top:4px;}
/* MODAL */
.mo{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000000cc;z-index:200;align-items:flex-end;justify-content:center;}
.mo.open{display:flex;}
.mb{background:var(--card);border:1px solid var(--border);border-radius:18px 18px 0 0;padding:20px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom));}
/* WEEK */
.wg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:10px;}
.dp{border-radius:8px;padding:6px 2px;text-align:center;cursor:pointer;border:1px solid var(--border);}
.dp.muscu{border-color:var(--green);background:#0a1f18;}
.dp.cardio{border-color:var(--red);background:#2d0a0a;}
.dp.renfo{border-color:var(--purple);background:#1a0a30;}
.dp.repos{border-color:var(--border);opacity:.5;}
.dj{font-size:9px;color:var(--muted);font-weight:700;}
.di{font-size:13px;margin-top:1px;}
/* ALERTS */
.alert{border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:12px;line-height:1.6;}
.alert-o{background:#2d1a00;border:1px solid #f59e0b33;color:var(--orange);}
.alert-b{background:#0a1530;border:1px solid #3b82f633;color:var(--blue);}
.alert-g{background:#0a1f18;border:1px solid #00c89633;color:var(--green);}
/* CHART */
.chart-wrap{width:100%;overflow-x:auto;}
/* INSTALL BANNER */
#install-banner{display:none;position:fixed;top:60px;left:50%;transform:translateX(-50%);width:calc(100% - 24px);max-width:456px;background:linear-gradient(135deg,#0a1f18,#0d1520);border:1px solid var(--green);border-radius:12px;padding:12px 14px;z-index:150;box-shadow:0 4px 20px #00c89622;}
/* TOAST */
#toast{display:none;position:fixed;top:68px;left:50%;transform:translateX(-50%);background:var(--card);border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;z-index:999;white-space:nowrap;}
.logo-opt{width:56px;height:56px;border-radius:14px;cursor:pointer;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;transition:all .15s;background:var(--bg);}
.logo-opt:active,.logo-opt.selected{border-color:var(--green);background:#0a1f18;}
.logo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px;}
.color-dot{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.color-dot.selected{border-color:#fff;transform:scale(1.15);}
/* EXO ILLUS */
.illus-wrap{background:var(--bg);border-radius:10px;padding:10px;margin-bottom:10px;text-align:center;}
.muscle-map{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:8px;}
.muscle-tag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;}
/* ALT */
.alt-card{background:#0a1020;border:1px solid #1e2d42;border-radius:8px;padding:10px;margin-bottom:6px;cursor:pointer;}
.alt-name{font-size:13px;font-weight:700;color:#c9d1d9;}
.alt-why{font-size:11px;color:var(--muted);margin-top:2px;}
</style>
</head>
<body>

<div id="hdr">
  <div style="display:flex;align-items:center;gap:10px;">
    <div id="app-logo" onclick="showPage('profil')" style="cursor:pointer;flex-shrink:0;">
      <svg id="logo-svg" width="42" height="42" viewBox="0 0 42 42">
        <rect width="42" height="42" rx="12" fill="url(#lg-grad)"/>
        <defs>
          <linearGradient id="lg-grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#00c896"/>
            <stop offset="100%" stop-color="#0066cc"/>
          </linearGradient>
        </defs>
        <!-- Haltere gauche -->
        <rect x="4" y="19" width="7" height="4" rx="2" fill="#fff" opacity=".95"/>
        <rect x="4" y="15" width="4" height="12" rx="2" fill="#fff" opacity=".85"/>
        <!-- Barre centrale -->
        <rect x="11" y="20" width="20" height="2" rx="1" fill="#fff" opacity=".9"/>
        <!-- Haltere droite -->
        <rect x="31" y="19" width="7" height="4" rx="2" fill="#fff" opacity=".95"/>
        <rect x="34" y="15" width="4" height="12" rx="2" fill="#fff" opacity=".85"/>
        <!-- Petit coeur puls -->
        <polyline points="15,13 17,10 19,14 21,9 23,14 25,11 27,13" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity=".7"/>
      </svg>
      <img id="logo-img" src="" alt="" style="display:none;width:42px;height:42px;border-radius:12px;object-fit:cover;"/>
    </div>
    <div>
      <div class="ht" id="app-name-hdr">FitTrack Pro</div>
      <div class="hs" id="hs">Chargement...</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div id="hdr-streak" style="font-size:11px;color:#f59e0b;font-weight:700;"></div>
    <button onclick="showPage('profil')" style="background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer;">&#9881;</button>
  </div>
</div>

<div id="page-dashboard" class="pg active"></div>
<div id="page-programme" class="pg"></div>
<div id="page-seance" class="pg"></div>
<div id="page-nutrition" class="pg"></div>
<div id="page-stats" class="pg"></div>
<div id="page-profil" class="pg"></div>

<nav id="nav">
  <button class="nb active" onclick="showPage('dashboard')"><span class="ni">&#128200;</span>Accueil</button>
  <button class="nb" onclick="showPage('programme')"><span class="ni">&#128197;</span>Plan</button>
  <button class="nb" onclick="showPage('seance')"><span class="ni">&#127947;</span>Seance</button>
  <button class="nb" onclick="showPage('nutrition')"><span class="ni">&#129367;</span>Nutri</button>
  <button class="nb" onclick="showPage('stats')"><span class="ni">&#128202;</span>Stats</button>
</nav>

<!-- TIMER OVERLAY -->
<div id="timer-overlay">
  <div style="text-align:center;padding:20px;">
    <div style="font-size:14px;color:var(--muted);margin-bottom:16px;" id="timer-exo-name"></div>
    <div class="timer-circle">
      <svg class="timer-svg" width="180" height="180" id="timer-svg">
        <circle cx="90" cy="90" r="82" fill="none" stroke="#1e2d42" stroke-width="6"/>
        <circle cx="90" cy="90" r="82" fill="none" stroke="var(--green)" stroke-width="6"
          stroke-dasharray="515" stroke-dashoffset="0" id="timer-arc" stroke-linecap="round"/>
      </svg>
      <div class="timer-num" id="timer-num">00</div>
      <div class="timer-lbl" id="timer-lbl">secondes</div>
    </div>
    <div style="margin-top:20px;display:flex;gap:12px;justify-content:center;">
      <button class="btn btn-s" style="width:120px;" onclick="pauseTimer()">Pause</button>
      <button class="btn btn-d" style="width:120px;" onclick="stopTimer()">Arreter</button>
    </div>
  </div>
</div>

<!-- MODAL EXO -->
<div id="mo-exo" class="mo" onclick="closeMo('mo-exo')">
  <div class="mb" onclick="event.stopPropagation()">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div style="font-size:16px;font-weight:800;" id="mo-title"></div>
      <button onclick="closeMo('mo-exo')" style="background:var(--border);border:none;color:var(--text);border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;">x</button>
    </div>
    <div id="mo-content"></div>
  </div>
</div>

<!-- INSTALL BANNER -->
<div id="install-banner">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
    <div>
      <div style="font-size:13px;font-weight:700;color:var(--green);">Installer l'app sur votre telephone</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;">Acceder depuis votre ecran d'accueil</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button id="btn-install" class="btn btn-s" style="width:auto;padding:8px 14px;font-size:12px;">Installer</button>
      <button onclick="document.getElementById('install-banner').style.display='none'" style="background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer;">x</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
// PWA INSTALL
// ============================================================
var deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'block';
});
document.getElementById('btn-install').addEventListener('click', function() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(r) {
    if (r.outcome === 'accepted') toast('App installee !', '#00c896');
    deferredPrompt = null;
    document.getElementById('install-banner').style.display = 'none';
  });
});
window.addEventListener('appinstalled', function() {
  toast('FitTrack Pro installe !', '#00c896');
  document.getElementById('install-banner').style.display = 'none';
});

// ============================================================
// TIMER
// ============================================================
var timerInterval = null, timerRemaining = 0, timerTotal = 0, timerPaused = false;
var timerCallback = null;

function startTimer(seconds, label, cb) {
  timerTotal = seconds; timerRemaining = seconds; timerCallback = cb||null;
  document.getElementById('timer-exo-name').textContent = label||"";
  document.getElementById('timer-overlay').classList.add('open');
  timerPaused = false;
  updateTimerDisplay();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(function() {
    if (timerPaused) return;
    timerRemaining--;
    updateTimerDisplay();
    if (timerRemaining <= 0) {
      clearInterval(timerInterval);
      document.getElementById('timer-overlay').classList.remove('open');
      // Vibration
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      toast("Temps ecoule !", "#00c896");
      if (timerCallback) timerCallback();
    }
  }, 1000);
}
function updateTimerDisplay() {
  var m = Math.floor(timerRemaining/60), s = timerRemaining%60;
  document.getElementById('timer-num').textContent = timerRemaining >= 60 ? (m+":"+(s<10?"0":"")+s) : String(timerRemaining);
  document.getElementById('timer-lbl').textContent = timerRemaining >= 60 ? "min" : "secondes";
  // Arc
  var pct = timerTotal > 0 ? timerRemaining/timerTotal : 0;
  var circ = 2 * Math.PI * 82;
  document.getElementById('timer-arc').setAttribute('stroke-dashoffset', String(circ * (1-pct)));
  var col = timerRemaining > timerTotal*0.5 ? "#00c896" : timerRemaining > timerTotal*0.25 ? "#f59e0b" : "#ef4444";
  document.getElementById('timer-arc').setAttribute('stroke', col);
  document.getElementById('timer-num').style.color = col;
}
function pauseTimer() {
  timerPaused = !timerPaused;
  document.querySelector('#timer-overlay button.btn-s').textContent = timerPaused ? "Reprendre" : "Pause";
}
function stopTimer() {
  clearInterval(timerInterval);
  document.getElementById('timer-overlay').classList.remove('open');
}

// Extraire secondes depuis le texte "45 sec", "60 sec", "30-45 sec" etc
function parseTimer(reps) {
  var m = String(reps).match(/(\d+)(?:-(\d+))?\s*(?:sec|s\b)/i);
  if (!m) {
    var mmin = String(reps).match(/(\d+)(?:-(\d+))?\s*min/i);
    if (mmin) return parseInt(mmin[1]) * 60;
    return 0;
  }
  return parseInt(m[2]||m[1]);
}

function loadAll(){
  try{
    var p=localStorage.getItem("ftp2-profil");profil=p?JSON.parse(p):Object.assign({},DEFAULT_PROFIL);
    var sj=localStorage.getItem("ftp2-salle");if(sj)salleJours=JSON.parse(sj);
    var w=localStorage.getItem("ftp2-poids");poidsLog=w?JSON.parse(w):[];
    var c=localStorage.getItem("ftp2-charges");chargesLog=c?JSON.parse(c):{};
    var s=localStorage.getItem("ftp2-seances");seancesLog=s?JSON.parse(s):[];
    var cl=localStorage.getItem("ftp2-cal");calLog=cl?JSON.parse(cl):[];
  }catch(e){profil=Object.assign({},DEFAULT_PROFIL);}
}
function saveAll(){
  try{
    localStorage.setItem("ftp2-profil",JSON.stringify(profil));
    localStorage.setItem("ftp2-salle",JSON.stringify(salleJours));
    localStorage.setItem("ftp2-poids",JSON.stringify(poidsLog));

    localStorage.setItem("ftp2-cal",JSON.stringify(calLog));

}

function getSeanceDuJour(jour) {
  // Retourne la seance salle ou maison selon le reglage
  var jourLow = jour.toLowerCase();
  if (jourLow === "mardi" && salleJours.mardi) {
    return PROGRAMME.find(function(p){return p.jour==="Mardi-salle";}) || PROGRAMME.find(function(p){return p.jour==="Mardi";});
  }
  if (jourLow === "jeudi" && salleJours.jeudi) {
    return PROGRAMME.find(function(p){return p.jour==="Jeudi-salle";}) || PROGRAMME.find(function(p){return p.jour==="Jeudi";});
  }
  return PROGRAMME.find(function(p){return p.jour===jour;});
}
function toggleSalle(jour) {
  salleJours[jour] = !salleJours[jour];
  saveAll();
  renderProgramme();
}
function dernierPoids(){return poidsLog.length?poidsLog[poidsLog.length-1].poids:(profil.poidsDepart||85);}
function imc(){var h=(profil.taille||170)/100;return(dernierPoids()/(h*h)).toFixed(1);}
function imcCat(v){return v<18.5?"Sous-poids":v<25?"Normal":v<30?"Surpoids":"Obesite";}
function poidsPerdu(){return Math.max(0,((profil.poidsDepart||85)-dernierPoids())).toFixed(1);}
function poidsRestant(){return Math.max(0,(dernierPoids()-(profil.poidsCible||78))).toFixed(1);}
function progPct(){var tot=(profil.poidsDepart||85)-(profil.poidsCible||78);var fait=(profil.poidsDepart||85)-dernierPoids();return tot>0?Math.min(100,Math.round(fait/tot*100)):0;}
function joursEcoules(){return Math.max(0,Math.floor((new Date()-new Date(profil.dateDepart||new Date()))/86400000));}
function todayJour(){return["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"][new Date().getDay()];}
function todaySeance(){return getSeanceDuJour(todayJour())||PROGRAMME[0];}
function nbSeancesSem(){
  var lundi=new Date();lundi.setDate(lundi.getDate()-((lundi.getDay()+6)%7));lundi.setHours(0,0,0,0);
  var fin=new Date(lundi);fin.setDate(fin.getDate()+6);
  return seancesLog.filter(function(s){var d=new Date(s.date);return d>=lundi&&d<=fin;}).length;
}

function poidsChart(){
  if(poidsLog.length<2) return "<div style='color:#3d4a5c;text-align:center;padding:20px;font-size:12px;'>Enregistrez votre poids pour voir la courbe</div>";
  var vals=poidsLog.slice(-14).map(function(p){return p.poids;});
  var dates=poidsLog.slice(-14).map(function(p){return p.date.slice(5);});
  var W=300,H=100,PL=32,PR=12,PT=10,PB=22,cW=W-PL-PR,cH=H-PT-PB;
  var minV=Math.min.apply(null,vals.concat([profil.poidsCible||78]))-0.5;
  var maxV=Math.max.apply(null,vals)+0.5;
  var xS=cW/Math.max(vals.length-1,1);
  function px(i){return PL+i*xS;}
  function py(v){return PT+cH-(v-minV)/(maxV-minV)*cH;}
  var pts=vals.map(function(v,i){return px(i)+","+py(v);}).join(" ");
  var fill="M"+px(0)+","+py(vals[0]);for(var i=1;i<vals.length;i++)fill+=" L"+px(i)+","+py(vals[i]);
  fill+=" L"+px(vals.length-1)+","+(PT+cH)+" L"+px(0)+","+(PT+cH)+" Z";
  var cible=profil.poidsCible||78;
  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px;">'
    +'<defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00c896" stop-opacity="0.3"/><stop offset="100%" stop-color="#00c896" stop-opacity="0"/></linearGradient></defs>'
    +'<line x1="'+PL+'" y1="'+PT+'" x2="'+PL+'" y2="'+(PT+cH)+'" stroke="#1e2d42" stroke-width="1"/>'
    +'<line x1="'+PL+'" y1="'+(PT+cH)+'" x2="'+(W-PR)+'" y2="'+(PT+cH)+'" stroke="#1e2d42" stroke-width="1"/>'
    +'<text x="'+(PL-3)+'" y="'+(PT+5)+'" fill="#5b7a9e" font-size="8" text-anchor="end">'+maxV.toFixed(1)+'</text>'
    +'<text x="'+(PL-3)+'" y="'+(PT+cH+5)+'" fill="#5b7a9e" font-size="8" text-anchor="end">'+minV.toFixed(1)+'</text>'
    +(cible>=minV&&cible<=maxV?'<line x1="'+PL+'" y1="'+py(cible)+'" x2="'+(W-PR)+'" y2="'+py(cible)+'" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2"/><text x="'+(W-PR+2)+'" y="'+(py(cible)+4)+'" fill="#f59e0b" font-size="7">'+cible+'</text>':"")
    +'<path d="'+fill+'" fill="url(#wg)"/>'
    +'<polyline points="'+pts+'" fill="none" stroke="#00c896" stroke-width="2.5"/>'
    +vals.map(function(v,i){
      var step=Math.ceil(vals.length/5);
      var lbl=i%step===0?'<text x="'+px(i)+'" y="'+(H-5)+'" fill="#5b7a9e" font-size="7" text-anchor="middle">'+dates[i]+'</text>':"";
      return'<circle cx="'+px(i)+'" cy="'+py(v)+'" r="3" fill="#00c896"/>'+lbl;
    }).join('')
    +'</svg>';
  return svg;
}

function chargesChart(exoNom){
  var data=[];
  seancesLog.forEach(function(s){
    if(s.charges&&s.charges[exoNom]) data.push({date:s.date.slice(5),v:s.charges[exoNom]});
  });
  if(data.length<2) return "<div style='color:#3d4a5c;text-align:center;padding:16px;font-size:11px;'>Pas assez de donnees encore</div>";
  var vals=data.map(function(d){return d.v;});
  var W=260,H=80,PL=28,PR=8,PT=8,PB=18,cW=W-PL-PR,cH=H-PT-PB;
  var minV=Math.min.apply(null,vals)-1,maxV=Math.max.apply(null,vals)+1;
  var xS=cW/Math.max(vals.length-1,1);
  function px(i){return PL+i*xS;}
  function py(v){return PT+cH-(v-minV)/(maxV-minV)*cH;}
  var pts=vals.map(function(v,i){return px(i)+","+py(v);}).join(" ");
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px;">'
    +'<polyline points="'+pts+'" fill="none" stroke="#3b82f6" stroke-width="2"/>'
    +vals.map(function(v,i){return'<circle cx="'+px(i)+'" cy="'+py(v)+'" r="3" fill="#3b82f6"/>';}).join('')
    +'</svg>';
}

function calChart(){
  var last7=[];var now=new Date();
  for(var d=6;d>=0;d--){var dt=new Date(now);dt.setDate(dt.getDate()-d);var ds=dt.toISOString().split("T")[0];var entry=calLog.find(function(c){return c.date===ds;});last7.push({date:ds.slice(5),kcal:entry?entry.kcal:0});}
  var W=280,H=80,PL=5,PR=5,PT=8,PB=20,cW=W-PL-PR,cH=H-PT-PB;
  var maxV=Math.max.apply(null,last7.map(function(d){return d.kcal;}));if(!maxV)maxV=profil.calories||2150;
  var barW=Math.floor(cW/7)-4;
  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px;">';
  last7.forEach(function(d,i){
    var x=PL+i*(barW+4),h2=Math.max(2,Math.round(d.kcal/maxV*cH));
    var col=d.kcal>(profil.calories||2150)*1.1?"#ef4444":d.kcal>(profil.calories||2150)*0.9?"#00c896":"#3b82f6";
    svg+='<rect x="'+x+'" y="'+(PT+cH-h2)+'" width="'+barW+'" height="'+h2+'" rx="2" fill="'+col+'"/>';
    svg+='<text x="'+(x+barW/2)+'" y="'+(H-4)+'" fill="#5b7a9e" font-size="8" text-anchor="middle">'+d.date.split("-")[1]+'</text>';
    if(d.kcal>0) svg+='<text x="'+(x+barW/2)+'" y="'+(PT+cH-h2-2)+'" fill="'+col+'" font-size="7" text-anchor="middle">'+d.kcal+'</text>';
  });
  svg+='</svg>';
  return svg;
}

function openExoInfo(jourNom, exoIdx){
  var jour=PROGRAMME.find(function(p){return p.jour===jourNom;});
  if(!jour) return;
  var e=jour.exercices[exoIdx];
  if(!e) return;
  document.getElementById("mo-title").textContent=e.nom;
  var h="";
  // Illustration
  h+='<div class="illus-wrap">'+getIllus(e.nom,e.muscle)+'</div>';
  // Muscles
  var muscles=(e.muscle||"").split("/").map(function(m){return m.trim();});
  h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">';
  muscles.forEach(function(m){
    var col=MUSCLE_COLORS[m]||"#8892a4";
    h+='<span style="background:'+col+'22;border:1px solid '+col+'44;color:'+col+';border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;">'+m+'</span>';
  });
  if(e.poids_corps) h+='<span class="tag tg">Poids corps</span>';
  if(e.statique)    h+='<span class="tag tb">Statique</span>';
  h+='</div>';
  // Serie / reps
  h+='<div style="background:#060a10;border-radius:8px;padding:10px;margin-bottom:10px;display:flex;justify-content:space-around;text-align:center;">';
  h+='<div><div style="font-size:20px;font-weight:800;color:var(--green);">'+e.series+'</div><div style="font-size:10px;color:var(--muted);">series</div></div>';
  h+='<div style="width:1px;background:var(--border);"></div>';
  h+='<div><div style="font-size:15px;font-weight:800;color:var(--orange);">'+e.reps+'</div><div style="font-size:10px;color:var(--muted);">reps / duree</div></div>';
  h+='</div>';
  // Timer si statique ou secondes
  var secs=parseTimer(e.reps);
  if(secs>0){
    h+='<button class="btn btn-s" style="margin-bottom:10px;" onclick="startTimer('+secs+',\''+e.nom+'\')">Lancer le timer ('+secs+' sec)</button>';
  }
  // Notes
  h+='<div class="alert-b" style="margin-bottom:10px;font-size:12px;">'+e.notes+'</div>';
  // Charge
  if(!e.poids_corps){
    var charge=chargesLog[e.nom]||"";
    h+='<div style="margin-bottom:10px;"><label class="lbl">Ma charge (kg)</label><div style="display:flex;gap:8px;"><input type="number" id="mo-ch" class="inp" value="'+charge+'" placeholder="kg" step="0.5">';
    h+='<button class="btn btn-s" style="width:auto;padding:8px 14px;" onclick="saveChargeMo(\''+e.nom+'\')">Sauver</button></div></div>';

function addRepas(){
  var nom=(document.getElementById("n-nom").value||"").trim();
  var k=parseInt(document.getElementById("n-k").value)||0;
  var p2=parseInt(document.getElementById("n-p").value)||0;
  var g2=parseInt(document.getElementById("n-g").value)||0;
  var l2=parseInt(document.getElementById("n-l").value)||0;
  if(!nom||!k){toast("Nom et calories requis","#ef4444");return;}
  var today=new Date().toISOString().split("T")[0];
  var idx=calLog.findIndex(function(c){return c.date===today;});
  if(idx===-1){calLog.push({date:today,kcal:0,proteines:0,glucides:0,lipides:0,repas:[]});idx=calLog.length-1;}
  calLog[idx].kcal+=k;calLog[idx].proteines+=p2;calLog[idx].glucides+=g2;calLog[idx].lipides+=l2;
  calLog[idx].repas.push({nom:nom,kcal:k,prot:p2,gluc:g2,lip:l2});
  saveAll();toast("Ajoute !");renderNutrition();
}
function delRepas(i){
  var today=new Date().toISOString().split("T")[0];
  var idx=calLog.findIndex(function(c){return c.date===today;});if(idx===-1)return;
  var r=calLog[idx].repas[i];
  calLog[idx].kcal-=r.kcal;calLog[idx].proteines-=r.prot;calLog[idx].glucides-=r.gluc;calLog[idx].lipides-=r.lip;
  calLog[idx].repas.splice(i,1);saveAll();renderNutrition();
}

  if(seancesLog.length){
    var last=seancesLog[seancesLog.length-1];
    h+='<div style="font-size:11px;color:var(--muted);">Derniere seance : '+last.nom+' le '+last.date+'</div>';
  }
  h+='</div>';
  // Charges progression
  h+='<div class="card"><div class="ct">Progression des charges</div>';
  var exosAvecCharge=Object.keys(chargesLog);
  if(exosAvecCharge.length){
    exosAvecCharge.slice(0,8).forEach(function(nom){
      h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #0e1b2a;">';
      h+='<div style="font-size:12px;font-weight:600;color:#c9d1d9;">'+nom+'</div>';
      h+='<div style="color:var(--green);font-weight:800;">'+chargesLog[nom]+' kg</div></div>';
    });
  } else {
    h+='<div style="color:var(--muted);font-size:12px;text-align:center;padding:16px;">Enregistrez vos charges pendant les seances</div>';
  }
  h+='</div>';
  // Nutrition 7j
  h+='<div class="card"><div class="ct">Calories 7 derniers jours</div>'+calChart()+'</div>';
  // IMC historique
  h+='<div class="card"><div class="ct">Recap general</div>';
  h+='<div class="kpi4">';
  h+='<div class="kb"><div class="kv" style="color:var(--green);font-size:18px;">'+imc()+'</div><div class="kl">IMC</div></div>';
  h+='<div class="kb"><div class="kv" style="color:var(--orange);font-size:18px;">'+poidsPerdu()+'</div><div class="kl">kg perdus</div></div>';
  h+='<div class="kb"><div class="kv" style="color:var(--blue);font-size:18px;">'+joursEcoules()+'</div><div class="kl">jours</div></div>';
  h+='<div class="kb"><div class="kv" style="color:var(--purple);font-size:18px;">'+progPct()+'%</div><div class="kl">objectif</div></div>';
  h+='</div></div>';
  document.getElementById("page-stats").innerHTML=h;
}

// PROFIL
// ============================================================
function renderProfil(){
  var h="";
  // Logo editor
  h += renderLogoEditor();
  h+='<div class="card"><div class="ct">Mon profil</div>';
  h+='<div class="mb10"><label class="lbl">Prenom</label><input type="text" id="p-pre" class="inp" value="'+(profil.prenom||"")+'"></div>';
  h+='<div class="fg3"><div><label class="lbl">Taille (cm)</label><input type="number" id="p-tai" class="inp" value="'+(profil.taille||170)+'"></div>';
  h+='<div><label class="lbl">Age</label><input type="number" id="p-age" class="inp" value="'+(profil.age||35)+'"></div>';
  h+='<div><label class="lbl">Mois objectif</label><input type="number" id="p-moi" class="inp" value="'+(profil.objectifMois||5)+'"></div></div>';
  h+='<div class="fg2"><div><label class="lbl">Poids depart</label><input type="number" id="p-dep" class="inp" value="'+(profil.poidsDepart||85)+'" step="0.1"></div>';
  h+='<div><label class="lbl">Poids cible</label><input type="number" id="p-cib" class="inp" value="'+(profil.poidsCible||78)+'" step="0.1"></div></div>';
  h+='<div class="mb10"><label class="lbl">Date de depart</label><input type="date" id="p-dat" class="inp" value="'+(profil.dateDepart||new Date().toISOString().split("T")[0])+'"></div>';
  h+='<button class="btn btn-p" onclick="saveProfil()">Enregistrer</button></div>';
  h+='<div class="card"><div class="ct">Nutrition cibles</div>';
  h+='<div class="fg2"><div><label class="lbl">Calories/jour</label><input type="number" id="p-cal" class="inp" value="'+(profil.calories||2150)+'"></div>';
  h+='<div><label class="lbl">Proteines (g)</label><input type="number" id="p-pro" class="inp" value="'+(profil.proteines||170)+'"></div></div>';
  h+='<div class="fg2"><div><label class="lbl">Glucides (g)</label><input type="number" id="p-glu" class="inp" value="'+(profil.glucides||190)+'"></div>';
  h+='<div><label class="lbl">Lipides (g)</label><input type="number" id="p-lip" class="inp" value="'+(profil.lipides||60)+'"></div></div>';
  h+='<button class="btn btn-p" onclick="saveProfil()">Enregistrer</button></div>';
  h+='<div class="card"><div class="ct">Mes contraintes physiques</div>';
  h+='<div class="mb10"><textarea id="p-con" class="inp" rows="3" style="resize:none;">'+(profil.contraintes||"")+'</textarea></div>';
  h+='<button class="btn btn-s" onclick="saveCon()">Sauver contraintes</button></div>';
  h+='<div class="card"><div class="ct">Installer l\'app</div>';
  h+='<div class="alert-b" style="margin-bottom:10px;font-size:12px;">Sur Android Chrome : cliquez sur le menu (3 points) puis "Ajouter a l\'ecran d\'accueil". L\'app s\'installera comme une vraie application.</div>';
  h+='<button class="btn btn-s" id="btn-install2" onclick="triggerInstall()">Installer FitTrack Pro</button></div>';
  h+='<div class="card" style="border-color:#ef444422;"><div class="ct" style="color:var(--red);">Zone danger</div>';
  h+='<button class="btn btn-d" style="padding:10px;" onclick="resetAll()">Reinitialiser toutes les donnees</button></div>';
  document.getElementById("page-profil").innerHTML=h;
  // Logo editor event delegation
  var pp = document.getElementById("page-profil");
  if(pp){
    pp.addEventListener("click", function(e){
      var t = e.target;
      if(t.dataset.logoType){ setLogoType(t.dataset.logoType); }
      else if(t.dataset.c1){ setLogoColor(t.dataset.c1, t.dataset.c2); }
      else if(t.dataset.emoji){ setLogoEmoji(t.dataset.emoji); }
      else if(t.id==="btn-save-logo"){ saveLogo(); }
      else if(t.id==="btn-photo-pick"){ document.getElementById("logo-file").click(); }
      else if(t.id==="btn-install2"){ triggerInstall(); }
    });
    var lf = document.getElementById("logo-file");
    if(lf) lf.addEventListener("change", function(){ handleLogoPhoto(this); });
  }
}
function saveProfil(){
  profil.prenom=document.getElementById("p-pre").value;
  profil.taille=parseInt(document.getElementById("p-tai").value)||170;
  profil.age=parseInt(document.getElementById("p-age").value)||35;
  profil.objectifMois=parseInt(document.getElementById("p-moi").value)||5;
  profil.poidsDepart=parseFloat(document.getElementById("p-dep").value)||85;
  profil.poidsCible=parseFloat(document.getElementById("p-cib").value)||78;
  profil.dateDepart=document.getElementById("p-dat").value;
  profil.calories=parseInt(document.getElementById("p-cal").value)||2150;
  profil.proteines=parseInt(document.getElementById("p-pro").value)||170;
  profil.glucides=parseInt(document.getElementById("p-glu").value)||190;
  profil.lipides=parseInt(document.getElementById("p-lip").value)||60;
  saveAll();applyLogo();toast("Profil enregistre !");renderDashboard();
}
function saveCon(){profil.contraintes=document.getElementById("p-con").value;saveAll();toast("Sauvegarde !");}
function triggerInstall(){
  if(deferredPrompt){deferredPrompt.prompt();}
  else{toast("Ouvrez le menu Chrome (3 points) > Ajouter a l'ecran d'accueil","#3b82f6");}
}
function resetAll(){
  if(!confirm("Supprimer TOUTES les donnees ?"))return;
  poidsLog=[];chargesLog={};seancesLog=[];calLog=[];
  profil=Object.assign({},DEFAULT_PROFIL);
  saveAll();toast("Reinitialise");renderDashboard();showPage("dashboard");
}

// LOGO & APPARENCE
// ============================================================
var LOGO_EMOJIS = ["&#128170;","&#127947;","&#9889;","&#128293;","&#127939;","&#129336;","&#128081;","&#11088;","&#128170;","&#127947;","&#129304;","&#128640;","&#129354;","&#127942;","&#9971;","&#128736;","&#128293;","&#127775;","&#128200;","&#9881;"];
var LOGO_COLORS = [
  ["#00c896","#0066cc"],["#ef4444","#f59e0b"],["#8b5cf6","#3b82f6"],
  ["#f59e0b","#ef4444"],["#06b6d4","#00c896"],["#ec4899","#8b5cf6"],

function applyLogo() {
  var cfg = profil.logoCfg || {type:"svg",emoji:null,color1:"#00c896",color2:"#0066cc",appName:"FitTrack Pro"};
  // App name
  var nameEl = document.getElementById("app-name-hdr");
  if(nameEl) nameEl.textContent = cfg.appName || "FitTrack Pro";
  document.title = cfg.appName || "FitTrack Pro";
  // Logo
  var svgEl = document.getElementById("logo-svg");
  var imgEl = document.getElementById("logo-img");
  if(!svgEl||!imgEl) return;
  if(cfg.type==="photo"&&cfg.dataUrl) {
    imgEl.src=cfg.dataUrl; imgEl.style.display="block"; svgEl.style.display="none";
  } else if(cfg.type==="emoji"&&cfg.emoji) {
    svgEl.style.display="block"; imgEl.style.display="none";
    var grad=svgEl.querySelector("#lg-grad");
    if(grad){grad.children[0].setAttribute("stop-color",cfg.color1||"#00c896");grad.children[1].setAttribute("stop-color",cfg.color2||"#0066cc");}
    // Replace content with emoji
    var existing=svgEl.querySelector(".logo-emoji-text");
    if(!existing){var t=document.createElementNS("http://www.w3.org/2000/svg","text");t.setAttribute("x","21");t.setAttribute("y","28");t.setAttribute("text-anchor","middle");t.setAttribute("font-size","22");t.classList.add("logo-emoji-text");svgEl.appendChild(t);}
    var tel=svgEl.querySelector(".logo-emoji-text");
    if(tel){tel.textContent=cfg.emoji.replace(/&#(\d+);/,function(_,c){return String.fromCodePoint(parseInt(c));});}
    // Hide dumbbell elements
    svgEl.querySelectorAll("rect,polyline").forEach(function(el){el.style.display="none";});
  } else {
    svgEl.style.display="block"; imgEl.style.display="none";
    var grad2=svgEl.querySelector("#lg-grad");
    if(grad2){grad2.children[0].setAttribute("stop-color",cfg.color1||"#00c896");grad2.children[1].setAttribute("stop-color",cfg.color2||"#0066cc");}
    svgEl.querySelectorAll("rect,polyline").forEach(function(el){el.style.display="";});
    var tel2=svgEl.querySelector(".logo-emoji-text");if(tel2)tel2.textContent="";
  }
}

function renderLogoEditor() {
  var cfg = profil.logoCfg || {type:"svg",emoji:null,color1:"#00c896",color2:"#0066cc",appName:"FitTrack Pro"};
  var h = "";

  h += "<div class=\"card\">";
  h += "<div class=\"ct\">Nom de l&#39;application</div>";
  h += "<div class=\"mb10\"><input type=\"text\" id=\"logo-appname\" class=\"inp\" value=\"" + (cfg.appName||"FitTrack Pro") + "\" placeholder=\"Nom de l&#39;app\"></div>";
  h += "</div>";

  h += "<div class=\"card\">";
  h += "<div class=\"ct\">Style du logo</div>";
  h += "<div style=\"display:flex;gap:8px;margin-bottom:14px;\">";
  var types = [{k:"svg",l:"Haltere"},{k:"emoji",l:"Emoji"},{k:"photo",l:"Photo"}];
  types.forEach(function(t){
    var sel = cfg.type === t.k;
    h += "<button data-logo-type=\"" + t.k + "\" style=\"flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid " + (sel?"var(--green)":"var(--border)") + ";background:" + (sel?"#0a1f18":"transparent") + ";color:" + (sel?"var(--green)":"var(--muted)") + ";font-family:inherit;\">" + t.l + "</button>";
  });
  h += "</div>";

  h += "<div class=\"ct\">Couleur du fond</div>";
  h += "<div class=\"logo-grid\" style=\"margin-bottom:14px;\">";
  var COLORS = [["#00c896","#0066cc"],["#ef4444","#f59e0b"],["#8b5cf6","#3b82f6"],["#f59e0b","#ef4444"],["#06b6d4","#00c896"],["#ec4899","#8b5cf6"],["#ff6b35","#f59e0b"],["#00c896","#8b5cf6"]];
  COLORS.forEach(function(pair){
    var sel = cfg.color1===pair[0] && cfg.color2===pair[1];
    h += "<div data-c1=\"" + pair[0] + "\" data-c2=\"" + pair[1] + "\" style=\"width:52px;height:52px;border-radius:12px;background:linear-gradient(135deg," + pair[0] + "," + pair[1] + ");cursor:pointer;border:2px solid " + (sel?"#fff":"transparent") + ";transition:all .15s;\"></div>";
  });
  h += "</div>";

  if(cfg.type === "emoji"){
    h += "<div class=\"ct\">Choisir un emoji</div>";
    h += "<div class=\"logo-grid\">";
    var emojis = ["&#128170;","&#127947;","&#9889;","&#128293;","&#127939;","&#129336;","&#128081;","&#11088;","&#129304;","&#128640;","&#129354;","&#127942;","&#9971;","&#128736;","&#127775;","&#128200;","&#129330;","&#127919;","&#128293;","&#9881;"];
    emojis.forEach(function(e){
      var sel = cfg.emoji === e;
      h += "<div data-emoji=\"" + e + "\" class=\"logo-opt" + (sel?" selected":"") + "\">" + e + "</div>";
    });
    h += "</div>";
  }

  if(cfg.type === "photo"){
    h += "<div class=\"ct\">Choisir une photo</div>";
    h += "<div style=\"margin-bottom:10px;\">";
    h += "<input type=\"file\" id=\"logo-file\" accept=\"image/*\" style=\"display:none;\">";
    h += "<button id=\"btn-photo-pick\" class=\"btn btn-s\">Choisir une image</button>";
    if(cfg.dataUrl) h += "<div style=\"margin-top:10px;\"><img src=\"" + cfg.dataUrl + "\" style=\"width:60px;height:60px;border-radius:14px;object-fit:cover;border:2px solid var(--green);\"/></div>";
    h += "</div>";
  }

  h += "<div style=\"text-align:center;padding:14px;background:var(--bg);border-radius:10px;margin-bottom:10px;\">";
  h += "<div style=\"font-size:11px;color:var(--muted);margin-bottom:8px;\">Apercu</div>";
  h += "<div style=\"display:inline-flex;align-items:center;gap:10px;background:#08090f;padding:8px 14px;border-radius:10px;\">";
  h += "<div style=\"font-size:28px;\">" + (cfg.type==="emoji"&&cfg.emoji?cfg.emoji:"&#128170;") + "</div>";
  h += "<div><div style=\"font-size:14px;font-weight:800;color:var(--green);\"> " + (cfg.appName||"FitTrack Pro") + "</div>";
  h += "<div style=\"font-size:10px;color:var(--muted)\">Mon programme</div></div></div></div>";
  h += "<button class=\"btn btn-p\" id=\"btn-save-logo\">Appliquer le logo</button>";
  h += "</div>";
  return h;
}
function setLogoType(t){
  if(!profil.logoCfg) profil.logoCfg={type:"svg",color1:"#00c896",color2:"#0066cc",appName:"FitTrack Pro"};
  profil.logoCfg.type=t;saveAll();renderProfil();
}
function setLogoColor(c1,c2){
  if(!profil.logoCfg) profil.logoCfg={type:"svg",color1:"#00c896",color2:"#0066cc",appName:"FitTrack Pro"};
  profil.logoCfg.color1=c1;profil.logoCfg.color2=c2;saveAll();renderProfil();
}
function setLogoEmoji(e){
  if(!profil.logoCfg) profil.logoCfg={type:"emoji",color1:"#00c896",color2:"#0066cc",appName:"FitTrack Pro"};
  profil.logoCfg.emoji=e;profil.logoCfg.type="emoji";saveAll();renderProfil();
}
function handleLogoPhoto(input){
  if(!input.files||!input.files[0]) return;
  var reader=new FileReader();
  reader.onload=function(e){
    if(!profil.logoCfg) profil.logoCfg={type:"photo",color1:"#00c896",color2:"#0066cc",appName:"FitTrack Pro"};
    profil.logoCfg.dataUrl=e.target.result;profil.logoCfg.type="photo";
    saveAll();toast("Photo chargee !");renderProfil();applyLogo();
  };
  reader.readAsDataURL(input.files[0]);
}
function saveLogo(){
  if(!profil.logoCfg) profil.logoCfg={type:"svg",color1:"#00c896",color2:"#0066cc",appName:"FitTrack Pro"};
  var nameEl=document.getElementById("logo-appname");
  if(nameEl) profil.logoCfg.appName=nameEl.value||"FitTrack Pro";
  saveAll();applyLogo();toast("Logo applique !");renderDashboard();
}

loadAll();
